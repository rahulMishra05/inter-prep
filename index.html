/* ===================== AI ENGINEERING MASTERCLASS ===================== */
S({
  id:'ai-masterclass', cat:'AI Engineering', icon:'🤖', title:'AI Engineering Masterclass', tag:'Signature',
  lede:'The theory + architecture behind your AI work: LLMs, embeddings, RAG, Semantic Kernel, function calling, agents, streaming, cost, security and evaluation. Read this before the AI question bank.',
  intro:`
    <h2>1. How LLMs work (just enough theory)</h2>
    <p>A Large Language Model is a <strong>transformer</strong> trained to predict the next <em>token</em> given prior tokens. It has no memory between calls — everything it "knows" in a request must fit in the <strong>context window</strong>. Text is split into tokens (~4 chars/token in English); you pay and are limited by tokens on both input and output.</p>
    <h3>Transformers & attention</h3>
    <p>The core mechanism is <strong>self-attention</strong>: each token computes weighted relationships to every other token (query·key → weights → weighted sum of values), letting the model focus on relevant context regardless of distance. Multi-head attention runs this in parallel subspaces. Stacked attention + feed-forward layers = the transformer. Decoder-only models (GPT family) generate autoregressively, one token at a time.</p>
    <h3>Sampling controls</h3>
    <ul><li><strong>temperature</strong>: randomness. 0 = deterministic/factual; higher = creative.</li>
    <li><strong>top_p</strong> (nucleus): sample from the smallest set of tokens whose probability sums to p.</li>
    <li><strong>max_tokens</strong>: caps output length (and cost).</li>
    <li><strong>stop</strong> sequences, <strong>frequency/presence penalties</strong> reduce repetition.</li></ul>

    <h2>2. Embeddings & vector search</h2>
    <p>An <strong>embedding</strong> maps text to a high-dimensional vector where semantic similarity ≈ geometric proximity (cosine similarity). Store vectors in a <strong>vector database</strong> (Azure AI Search vector index, pgvector, Pinecone, Qdrant) and query by nearest neighbor (ANN algorithms like HNSW) to retrieve semantically related chunks — the foundation of RAG.</p>

    <h2>3. RAG (Retrieval-Augmented Generation)</h2>
    <p>RAG grounds the LLM in your data to reduce hallucination and add fresh/private knowledge without fine-tuning:</p>
    <ol>
      <li><strong>Ingest:</strong> load documents → <strong>chunk</strong> (e.g., 300–800 tokens with overlap) → embed → store vectors + metadata.</li>
      <li><strong>Retrieve:</strong> embed the user query → nearest-neighbor search → optionally <strong>hybrid</strong> (vector + keyword/BM25) → <strong>rerank</strong> top-k.</li>
      <li><strong>Augment:</strong> insert retrieved chunks into the prompt with instructions to answer only from context and cite sources.</li>
      <li><strong>Generate:</strong> LLM produces a grounded answer.</li>
    </ol>
    <div class="callout warn"><span class="t">Advanced RAG</span>Chunking strategy, hybrid search, reranking (cross-encoders), query rewriting/HyDE, metadata filtering (tenant/date), and <strong>evaluation</strong> (retrieval precision/recall, groundedness) separate a demo from production RAG.</div>

    <h2>4. Function / tool calling</h2>
    <p>The model is given JSON schemas for tools it may call. Instead of answering directly, it can emit a structured request ("call getCost(styleId)"). Your code executes the tool and returns the result; the model continues. This turns an LLM into an <strong>orchestrator</strong> over deterministic business logic — exactly your 11-tool function-calling loop for garment costing.</p>
    <pre><code>// simplified loop
while (true) {
  var resp = await chat.CompleteAsync(messages, tools);
  if (resp.ToolCalls is null) return resp.Content;   // final answer
  foreach (var call in resp.ToolCalls) {
     var result = await Dispatch(call.Name, call.Arguments); // deterministic
     messages.Add(ToolMessage(call.Id, result));
  }
  // loop back so the model can use the results
}</code></pre>

    <h2>5. Semantic Kernel</h2>
    <p>Microsoft's orchestration SDK for .NET. Key concepts: the <strong>Kernel</strong> (DI container for AI), <strong>plugins/functions</strong> (native C# methods or prompt functions exposed as tools), <strong>planners</strong>, <strong>memory/connectors</strong>, and <strong>filters</strong> (cross-cutting: logging, PII redaction, token limits). It standardizes prompts, function calling, and model providers so you can swap Azure OpenAI models cleanly.</p>

    <h2>6. Agents & Agentic AI</h2>
    <p>An <strong>agent</strong> = LLM + tools + memory + a goal, running a reason→act→observe loop until done. <strong>Single-agent</strong> (one LLM with many tools) is simpler, cheaper, and easier to debug — often the right call (you replaced a rigid multi-agent design with a single agent). <strong>Multi-agent</strong> systems assign specialized roles (planner, researcher, critic) that collaborate — powerful but add latency, cost, and coordination complexity. Guardrails: bounded loops, tool whitelists, timeouts, and human-in-the-loop for high-impact actions.</p>

    <h2>7. Streaming & latency</h2>
    <p>Stream tokens to the UI so users see output immediately (perceived latency). Server-Sent Events (SSE) + <code>Channels</code> + browser <code>ReadableStream</code> deliver first-token in &lt;400ms. Optimize: smaller/faster models for simple steps, prompt caching, parallel tool calls, and trimming context.</p>

    <h2>8. Cost & token optimization</h2>
    <ul><li>Trim/compress prompts; move static instructions to a system message and reuse (prompt caching).</li>
    <li>Use a smaller model for routing/classification, a larger one only when needed (model cascade).</li>
    <li>Cap <code>max_tokens</code>; summarize long histories; retrieve only top-k relevant chunks.</li>
    <li>Cache deterministic results; batch embeddings. A well-built <strong>PromptBuilder</strong> cut token use ~40% in your project.</li></ul>

    <h2>9. AI security</h2>
    <ul><li><strong>Prompt injection:</strong> untrusted content overriding instructions — treat retrieved/user text as data, use strict system prompts, output validation, and never let the model's raw output trigger privileged actions without checks.</li>
    <li><strong>Data leakage:</strong> don't put secrets/PII in prompts; redact; scope retrieval per tenant.</li>
    <li><strong>Tool safety:</strong> whitelist tools, validate arguments, least-privilege, confirm destructive actions.</li>
    <li><strong>Output handling:</strong> sanitize before rendering (XSS) or executing.</li></ul>

    <h2>10. Evaluation & observability</h2>
    <p>You can't improve what you don't measure. Track groundedness/faithfulness, relevance, correctness (LLM-as-judge + human review + golden datasets), latency, token cost, and tool success rate. Log prompts, retrieved context, tool calls, and outputs (with PII care) for tracing and regression testing. Azure AI Foundry provides evaluation and tracing tooling.</p>
  `,
  groups:[]
});

/* ===================== AI INTERVIEW QUESTION BANK ===================== */
S({
  id:'ai-questions', cat:'AI Engineering', icon:'🧠', title:'AI Interview Question Bank', tag:'300+ concepts',
  lede:'Categorized AI/LLM interview questions with detailed answers — from fundamentals to production, Semantic Kernel, RAG, agents, cost, and security.',
  groups:[
    { name:'LLM Fundamentals', qs:[
      {lvl:'basic', q:'What is a token and why does it matter?',
       a:`<p>A token is the unit LLMs read/generate — roughly 4 English characters or ¾ of a word. Both <strong>context limits</strong> and <strong>pricing</strong> are in tokens (input + output). It matters for cost control, staying within the context window, and latency (more output tokens = slower). Always budget tokens: system prompt + retrieved context + history + expected output ≤ window.</p>`},
      {lvl:'basic', q:'What is the context window and what happens when you exceed it?',
       a:`<p>The maximum number of tokens the model can attend to in one request (input + output). Exceeding it errors or truncates. LLMs are stateless — no memory across calls — so all needed context (instructions, history, retrieved docs) must fit. Manage with summarization of old turns, retrieval instead of stuffing, and trimming.</p>`},
      {lvl:'intermediate', q:'What is temperature and when do you set it to 0?',
       a:`<p>Temperature scales randomness in token sampling. <strong>0</strong> (greedy/near-deterministic) for factual, structured, extraction, tool-calling, and classification tasks where you want consistency. Higher (0.7–1.0) for brainstorming/creative writing. For a costing engine you'd use low temperature so outputs are reproducible and auditable.</p>`},
      {lvl:'intermediate', q:'Explain the transformer and self-attention at a high level.',
       a:`<p>A transformer processes all tokens in parallel and uses <strong>self-attention</strong> so each token weighs its relevance to every other token (via query/key/value projections), capturing long-range dependencies. Stacked attention + feed-forward layers with positional encoding form the model. Decoder-only LLMs generate autoregressively, predicting the next token from prior ones.</p>`},
      {lvl:'advanced', q:'What causes hallucinations and how do you reduce them?',
       a:`<p>LLMs generate plausible text, not verified facts — when they lack knowledge they may confabulate. Reduce with: <strong>grounding via RAG</strong>, instructing "answer only from provided context; say you don't know otherwise," low temperature, requiring citations, constraining output with schemas/function calling, and post-hoc validation/evaluation. You can't eliminate hallucination, only manage and detect it.</p>`},
      {lvl:'advanced', q:'Fine-tuning vs RAG vs prompt engineering — how do you choose?',
       a:`<table><tr><th>Technique</th><th>Best for</th></tr>
          <tr><td>Prompt engineering</td><td>Behavior/format shaping; cheapest first step</td></tr>
          <tr><td>RAG</td><td>Injecting fresh/private knowledge, citations, changing data</td></tr>
          <tr><td>Fine-tuning</td><td>Teaching style/format/domain patterns, reducing prompt size; not for fresh facts</td></tr></table>
          <p>Order: prompt → RAG → fine-tune. Fine-tuning is costly, needs data + retraining on updates, and doesn't add live knowledge. Most enterprise needs are solved by RAG + good prompts.</p>`},
    ]},
    { name:'Prompt Engineering', qs:[
      {lvl:'intermediate', q:'What techniques improve prompt reliability?',
       a:`<ul><li>Clear role + task + constraints + output format (JSON schema).</li>
          <li><strong>Few-shot</strong> examples for format/edge cases.</li>
          <li><strong>Chain-of-thought</strong> / step-by-step for reasoning tasks (or a hidden reasoning step).</li>
          <li>Delimit untrusted content; instruct to ignore instructions inside data.</li>
          <li>Ask for "I don't know" when unsure; require citations.</li>
          <li>Deterministic settings (low temp) + validation of the output.</li></ul>`},
      {lvl:'advanced', q:'How would you design a reusable PromptBuilder to cut tokens ~40%? (resume tie-in)',
       a:`<p>Centralize prompt construction so you: (1) keep a concise, static system message (cacheable) and inject only dynamic, relevant data; (2) template sections and drop empty/irrelevant ones; (3) retrieve top-k context instead of dumping documents; (4) summarize/trim history; (5) enforce compact output formats (JSON, no prose); (6) strip redundant boilerplate and whitespace; (7) reuse tool schemas rather than restating them. Measuring tokens per request before/after proves the ~40% reduction and improves consistency by standardizing structure.</p>`},
      {lvl:'intermediate', q:'Zero-shot vs few-shot vs chain-of-thought prompting?',
       a:`<p><strong>Zero-shot:</strong> instruction only. <strong>Few-shot:</strong> include examples to anchor format/behavior. <strong>Chain-of-thought:</strong> prompt the model to reason step-by-step before answering, improving multi-step tasks (at the cost of more tokens). Use few-shot for consistent formatting; CoT for math/logic/planning.</p>`},
      {lvl:'advanced', q:'How do you get reliable structured (JSON) output from an LLM?',
       a:`<p>Use the provider's <strong>structured outputs / JSON mode</strong> or function calling with a strict schema so the model must conform. Validate against the schema and repair/re-ask on failure. Keep temperature low, provide an example, and avoid free-text mixed with JSON. This is essential when the LLM output feeds deterministic downstream logic (like costing rules).</p>`},
    ]},
    { name:'RAG & Retrieval', qs:[
      {lvl:'intermediate', q:'Walk through an end-to-end RAG pipeline.',
       a:`<p>Ingest (load → chunk with overlap → embed → store in vector index with metadata) → Retrieve (embed query → ANN search → hybrid keyword + rerank → filter by tenant/permissions) → Augment (compose prompt with top chunks + citation instructions) → Generate (grounded answer) → Evaluate/log. Each stage has quality levers; retrieval quality usually dominates answer quality.</p>`},
      {lvl:'advanced', q:'How do you choose a chunking strategy?',
       a:`<p>Chunk to balance retrieval precision vs context completeness. Common: 300–800 tokens with 10–20% overlap; prefer <strong>semantic/structural</strong> boundaries (headings, paragraphs, tables) over naive fixed windows. Too small → fragments lose meaning; too large → dilutes relevance and wastes tokens. Store metadata (source, section, tenant) for filtering and citation. Test with an eval set.</p>`},
      {lvl:'advanced', q:'What is hybrid search and why use it?',
       a:`<p>Combining <strong>vector</strong> (semantic) with <strong>keyword/BM25</strong> (lexical) retrieval. Vector search catches paraphrases/synonyms; keyword search nails exact terms, IDs, codes, and rare tokens that embeddings blur. Fuse results (e.g., Reciprocal Rank Fusion) then rerank. Hybrid typically beats either alone, especially for enterprise data with codes/part numbers.</p>`},
      {lvl:'advanced', q:'What is reranking and when is it worth it?',
       a:`<p>After ANN returns candidate chunks, a <strong>cross-encoder reranker</strong> scores each (query, chunk) pair jointly for relevance and reorders them, so the best go into the limited prompt budget. Worth it when top-k precision matters and you retrieve more candidates than you can include. Adds latency/cost, so cap candidates and cache.</p>`},
      {lvl:'senior', q:'How do you evaluate a RAG system?',
       a:`<p>Separate <strong>retrieval</strong> metrics (recall@k, precision@k, MRR — did we fetch the right chunks?) from <strong>generation</strong> metrics (groundedness/faithfulness — is the answer supported by context?, answer relevance, correctness vs golden answers). Use a labeled eval set + LLM-as-judge + human spot checks. Track over time to catch regressions when you change chunking/models/prompts.</p>`},
      {lvl:'scenario', q:'RAG returns confident but wrong answers. How do you debug?',
       a:`<p>Inspect the retrieved chunks first — most "wrong answers" are retrieval failures (irrelevant/missing context). Check: chunking, embedding model mismatch, query needing rewriting, missing hybrid/keyword for codes, and metadata filters excluding the right docs. If retrieval is good but generation strays, tighten the prompt ("only from context, cite, else say unknown"), lower temperature, and add groundedness evaluation to catch it automatically.</p>`},
    ]},
    { name:'Function Calling & Semantic Kernel', qs:[
      {lvl:'intermediate', q:'What is function/tool calling and why is it powerful?',
       a:`<p>You expose tool schemas; the model decides when to call them and returns structured arguments; your code executes deterministic logic and feeds results back. It bridges probabilistic language understanding with reliable business operations (DB lookups, calculations, APIs), enables grounding and actions, and keeps critical logic out of the model. It's the backbone of agents.</p>`},
      {lvl:'advanced', q:'Explain the function-calling loop in your single-agent design. (resume tie-in)',
       a:`<p>Messages + tool schemas go to the model. If it requests tool calls, you dispatch each to deterministic C# handlers (11 tools: costing lookups, rule checks, etc.), append results, and loop so the model can chain steps and synthesize a final answer. Replacing a rigid multi-agent architecture with one agent + a rich toolset reduced coordination overhead and maintenance while cutting analysis time 60–70%. Guardrails: max iterations, tool timeouts, argument validation, and logging every call.</p>`},
      {lvl:'intermediate', q:'What is Semantic Kernel and its core building blocks?',
       a:`<p>An open-source Microsoft SDK to orchestrate LLMs in .NET. Blocks: <strong>Kernel</strong> (registers AI services + plugins), <strong>plugins/functions</strong> (native C# or prompt templates exposed as callable tools), <strong>planners</strong> (auto-compose functions to reach a goal), <strong>memory/connectors</strong> (embeddings + vector stores), and <strong>filters</strong> for cross-cutting concerns (logging, PII redaction, token guards). It standardizes prompts and function calling across providers.</p>`},
      {lvl:'advanced', q:'How do Semantic Kernel filters help in production?',
       a:`<p>Filters intercept function/prompt invocation (like middleware): enforce token/cost limits, redact PII before sending, log inputs/outputs for observability, apply retry/timeout, block disallowed tool calls, and validate outputs. They centralize governance so every AI call is consistent and auditable — important for enterprise/multi-tenant compliance.</p>`},
      {lvl:'senior', q:'How do you prevent infinite or runaway tool-calling loops?',
       a:`<p>Bound iterations (max steps), add per-tool and overall timeouts, detect repeated identical calls, cap total tokens/cost per request, whitelist tools, validate arguments, and require human confirmation for high-impact actions. Emit telemetry per step so you can see and alert on loops. Design tools to be idempotent so retries are safe.</p>`},
    ]},
    { name:'Agentic AI', qs:[
      {lvl:'intermediate', q:'What defines an AI agent?',
       a:`<p>An agent = an LLM given a goal, a set of tools, and (optionally) memory, running an iterative reason→act→observe loop, deciding which tools to call and when it's done. Unlike a single prompt, it can plan, use external systems, and adapt based on tool results.</p>`},
      {lvl:'advanced', q:'Single-agent vs multi-agent — tradeoffs? Why did you consolidate to single-agent?',
       a:`<p><strong>Single-agent</strong> (one LLM + many tools): simpler, cheaper, lower latency, far easier to debug and maintain; the model handles orchestration. <strong>Multi-agent</strong> (specialized roles collaborating): can decompose complex problems and add checks, but multiplies token cost, latency, and coordination/error surface. Many "multi-agent" needs are met by one capable agent with good tools + prompts — which is why replacing a rigid multi-agent design with a single agent simplified the system while improving speed.</p>`},
      {lvl:'advanced', q:'How do you give an agent memory?',
       a:`<p>Short-term: the conversation history in-context (summarized as it grows). Long-term: store facts/embeddings in a vector or key-value store and retrieve relevant memories per turn (RAG over memory). Structured memory (user profile, preferences) in a DB. Manage window pressure by summarizing and retrieving rather than appending everything.</p>`},
      {lvl:'senior', q:'How do you make agents safe and reliable for business actions?',
       a:`<p>Least-privilege tools, argument validation, allow-lists, idempotency, dry-run/confirmation for destructive/expensive actions, bounded loops + timeouts, deterministic validation of LLM outputs before acting, full audit logging, and evaluation/regression tests. Keep the model as an orchestrator over trusted deterministic code — never let raw model output directly perform irreversible operations without checks.</p>`},
    ]},
    { name:'Azure OpenAI & AI Foundry', qs:[
      {lvl:'intermediate', q:'What is Azure OpenAI and why use it over the public API?',
       a:`<p>Azure OpenAI hosts OpenAI models within Azure with enterprise features: data privacy (your prompts/data aren't used to train models), regional deployment/compliance, VNet/private endpoints, managed identity auth, content filtering, quotas, and integration with Azure monitoring. Preferred for enterprise/regulated workloads and when you need Azure-native security and SLAs.</p>`},
      {lvl:'intermediate', q:'What is Azure AI Foundry and how did you use it? (resume tie-in)',
       a:`<p>Azure AI Foundry is Microsoft's platform to build, evaluate, deploy, and manage AI applications and agents — model catalog, prompt flow, evaluation, tracing/observability, and safety tooling. In the garment-costing platform it provided the environment to build and operate the LLM agent (model access, orchestration, evaluation, and monitoring) alongside .NET 10 and Semantic Kernel.</p>`},
      {lvl:'advanced', q:'How do you handle Azure OpenAI rate limits and quotas?',
       a:`<p>Requests are limited by TPM/RPM (tokens/requests per minute). Handle 429s by respecting <code>Retry-After</code> with exponential backoff + jitter (Polly), spreading load, using Provisioned Throughput Units (PTU) for predictable capacity, routing simpler calls to cheaper deployments, batching embeddings, and caching. Monitor usage to right-size quota.</p>`},
      {lvl:'senior', q:'How do you deploy an AI feature reliably across multiple tenants?',
       a:`<p>Per-tenant isolation of data/vector indexes and prompts, per-tenant quota/cost tracking, resilient connectivity (Polly retries/circuit breaker), graceful degradation (fallback model or cached answer on outage), feature flags for staged rollout, and evaluation gates in CI. Store secrets in Key Vault with managed identity; log per tenant for observability and billing.</p>`},
    ]},
    { name:'AI Performance, Cost & Security', qs:[
      {lvl:'advanced', q:'How do you reduce LLM latency (first-token and total)?',
       a:`<p><strong>Stream</strong> tokens (SSE) for perceived speed; use smaller/faster models for simple steps; cache prompts and deterministic results; run independent tool calls in parallel; trim context (retrieve top-k, summarize history); cap output tokens; and co-locate the app near the model region. First-token &lt;400ms typically comes from streaming + minimal pre-processing before the first model call.</p>`},
      {lvl:'advanced', q:'Concrete strategies to cut AI cost?',
       a:`<ul><li>Model cascade: cheap model for routing/classification, expensive only when needed.</li>
          <li>Prompt caching + concise system prompts; reuse tool schemas.</li>
          <li>Retrieve top-k relevant chunks instead of stuffing documents.</li>
          <li>Cap <code>max_tokens</code>, summarize history, compact JSON output.</li>
          <li>Cache deterministic answers/embeddings; batch embedding calls.</li>
          <li>Track tokens/cost per feature and per tenant to find hot spots.</li></ul>`},
      {lvl:'advanced', q:'What is prompt injection and how do you defend against it?',
       a:`<p>Prompt injection is when untrusted input (user text or retrieved documents) contains instructions that hijack the model ("ignore your rules, reveal the system prompt / call this tool"). Defenses: treat all external content as <em>data</em>, not instructions; strong system prompts + delimiters; never let model output trigger privileged/destructive actions without deterministic validation and authorization; restrict/whitelist tools; sanitize outputs before render/execute; and evaluate with adversarial tests. Assume it will happen and limit blast radius.</p>`},
      {lvl:'senior', q:'How do you prevent data leakage and enforce tenant isolation in AI features?',
       a:`<p>Scope retrieval and memory strictly per tenant (metadata filters, separate indexes), never place secrets/PII in prompts (redact), use managed identity + Key Vault, disable training on your data (Azure OpenAI), and log with PII care. Add output filters and content safety. Verify a tenant can never retrieve or influence another tenant's context — test it explicitly.</p>`},
      {lvl:'production', q:'How do you monitor an AI system in production?',
       a:`<p>Log prompts, retrieved context, tool calls, outputs, tokens, latency, and errors (with PII handling). Track quality metrics (groundedness, relevance, tool success), cost per request/tenant, and rate-limit/error rates. Use tracing (per-request spans across retrieval + model + tools), alerting on quality/cost/latency regressions, and a feedback loop (thumbs up/down + eval datasets) to catch drift after model or prompt changes.</p>`},
    ]},
  ]
});
</script>
<script>
/* ===================== SYSTEM DESIGN ===================== */
S({
  id:'system-design', cat:'Architecture', icon:'🏛️', title:'System Design for Senior Engineers', tag:'Architecture',
  lede:'Fundamentals (scalability, CAP, caching, queues) then applied design walkthroughs including AI chat, RAG, multi-tenant SaaS, and document/invoice processing — mapped to your resume.',
  intro:`
    <h2>Fundamentals every senior must own</h2>
    <table>
      <tr><th>Concept</th><th>What it means / lever</th></tr>
      <tr><td>Scalability</td><td>Vertical (bigger box) vs horizontal (more boxes + statelessness + load balancing). Prefer horizontal for web tiers.</td></tr>
      <tr><td>Availability</td><td>Redundancy, health checks, failover, no single point of failure; measured in nines.</td></tr>
      <tr><td>Reliability</td><td>Correct behavior under failure: retries, idempotency, timeouts, circuit breakers.</td></tr>
      <tr><td>Latency vs Throughput</td><td>Latency = time per request (p95/p99); throughput = requests/sec. Optimize the one that hurts.</td></tr>
      <tr><td>CAP theorem</td><td>Under a network partition, choose Consistency or Availability. Most web systems pick AP with eventual consistency; use CP where correctness is critical (payments).</td></tr>
      <tr><td>Consistency models</td><td>Strong vs eventual vs read-your-writes. Pick per use case.</td></tr>
      <tr><td>Replication</td><td>Leader/follower for read scaling + HA; watch replication lag for stale reads.</td></tr>
      <tr><td>Partitioning/Sharding</td><td>Split data by key (hash/range/tenant) to scale writes/storage; adds routing + rebalancing complexity.</td></tr>
      <tr><td>Caching</td><td>Client/CDN/app/DB layers; cache-aside; TTL + invalidation; guard against stampede.</td></tr>
      <tr><td>Load balancing</td><td>L4/L7, round-robin/least-connections, sticky vs stateless; health-based routing.</td></tr>
      <tr><td>CDN</td><td>Edge-cache static/media near users; lowers latency and origin load.</td></tr>
      <tr><td>Queues / Event-driven</td><td>Decouple producers/consumers, absorb spikes, enable async & retries; at-least-once + idempotency.</td></tr>
    </table>
    <div class="callout tip"><span class="t">Interview framework</span>1) Clarify functional + non-functional requirements & scale. 2) Estimate (QPS, storage, bandwidth). 3) Draw high-level components & data flow. 4) Design the data model & APIs. 5) Deep-dive a bottleneck. 6) Address scaling, caching, failure, consistency, security, observability. 7) State tradeoffs.</div>
    <h2>Back-of-envelope estimation</h2>
    <p>Anchor numbers: memory read ~100ns, SSD read ~100µs, network round trip within DC ~0.5ms, cross-region ~50–150ms. 1M requests/day ≈ ~12 QPS average, but plan for 5–10× peak. Storage = rows × size × replication × retention.</p>
  `,
  groups:[
    { name:'Core concept questions', qs:[
      {lvl:'intermediate', q:'How do you scale a stateless web API horizontally?',
       a:`<p>Keep instances <strong>stateless</strong> (no in-memory session) so any node can serve any request; put session/state in Redis or tokens. Front with a load balancer + health checks; autoscale on CPU/queue depth/latency. Externalize caches (distributed) and files (blob storage). Make deployments rolling/blue-green. The database usually becomes the bottleneck next — add read replicas and caching.</p>`},
      {lvl:'advanced', q:'Explain CAP and give a real tradeoff you would make.',
       a:`<p>During a network partition you can guarantee Consistency or Availability, not both. Example: for a shopping cart, choose <strong>AP</strong> (always accept writes, reconcile later) — availability matters more than momentary consistency. For a payment ledger, choose <strong>CP</strong> — reject writes rather than risk double-charging. In practice you tune per operation, not per whole system.</p>`},
      {lvl:'advanced', q:'When do you introduce a message queue and what does it cost you?',
       a:`<p>Introduce queues to decouple services, smooth traffic spikes, enable async processing and retries, and improve resilience (producer isn't blocked by slow consumer). Costs: eventual consistency, at-least-once delivery (need idempotent consumers), ordering challenges, operational overhead, and harder end-to-end tracing. Use for background/long tasks (document processing, emails, AI jobs), not for synchronous request/response that needs an immediate answer.</p>`},
      {lvl:'advanced', q:'How do you design idempotent, exactly-once-ish processing over an at-least-once queue?',
       a:`<p>True exactly-once is hard; aim for <strong>effectively-once</strong>: consumers dedupe using a message id / idempotency key stored in a DB (unique constraint), make handlers idempotent (upserts, conditional updates), and use transactional outbox on the producer side so DB writes and message publish don't diverge. Dead-letter poison messages after N retries.</p>`},
      {lvl:'senior', q:'How do you handle the database becoming the bottleneck?',
       a:`<p>Layered approach: add caching (Redis) for hot reads, add read replicas + route reads, optimize queries/indexes, introduce CQRS (separate read models), denormalize hot paths, then partition/shard by a good key (tenant/user) when a single primary can't take the write load. Consider a purpose-built store (search, time-series) for specific access patterns. Each step adds complexity — do them in order, driven by metrics.</p>`},
    ]},
    { name:'Applied design walkthroughs', qs:[
      {lvl:'senior', q:'Design a multi-tenant SaaS platform. (resume tie-in)',
       a:`<p><strong>Requirements:</strong> isolate tenant data, per-tenant config, scale, and cost attribution.</p>
          <p><strong>Isolation models:</strong> (1) shared DB + <code>TenantId</code> column with row-level security/global query filters — cheapest, densest; (2) schema-per-tenant; (3) DB-per-tenant — strongest isolation, priciest. Most SaaS start with shared-DB + strict filters and graduate large tenants to dedicated DBs.</p>
          <p><strong>Cross-cutting:</strong> resolve tenant from subdomain/JWT claim into a scoped context; enforce isolation in every query + storage prefix (blob containers, cache key prefixes); per-tenant quotas/rate limits; noisy-neighbor protection; per-tenant metrics/billing; feature flags per plan.</p>
          <p><strong>Scale:</strong> stateless app tier + LB, Redis cache, blob for documents (expiring SAS URLs), read replicas, and Polly-based resilience for external calls. This mirrors your 20+ tenant platform.</p>`},
      {lvl:'senior', q:'Design an AI chat system with streaming (like your costing assistant).',
       a:`<p><strong>Flow:</strong> client → API gateway → chat service → LLM (Azure OpenAI) with function/tool calling → tools hit DB/services → stream tokens back via SSE.</p>
          <p><strong>Key components:</strong> conversation store (history + summaries), prompt builder (token-optimized), tool dispatcher (deterministic C# handlers), vector store for RAG grounding, Redis for session + rate limiting, and an evaluation/observability layer.</p>
          <p><strong>Streaming:</strong> LLM token stream → <code>Channel</code> → SSE <code>ReadableStream</code> to browser for &lt;400ms first token. <strong>Reliability:</strong> cancellation on disconnect, bounded tool loops, retries/circuit breaker, fallback model. <strong>Cost:</strong> caching, model cascade, context trimming. <strong>Security:</strong> prompt-injection defenses, per-tenant retrieval isolation.</p>`},
      {lvl:'senior', q:'Design a RAG system for enterprise documents.',
       a:`<p><strong>Ingestion pipeline:</strong> connectors → parse (PDF/Office/OCR) → chunk (semantic, with overlap) → embed → upsert into vector index with metadata (tenant, source, ACL, date). Run async via a queue for large volumes.</p>
          <p><strong>Query path:</strong> auth + tenant scope → query rewrite → hybrid (vector + keyword) retrieval → rerank → assemble prompt with citations → LLM → grounded answer with sources.</p>
          <p><strong>Production concerns:</strong> permission-aware retrieval (never leak across tenants/users), freshness (re-index on document change), evaluation (recall@k, groundedness), caching of embeddings, cost controls, and observability of retrieved context per answer.</p>`},
      {lvl:'senior', q:'Design a document/invoice processing platform. (resume tie-in)',
       a:`<p><strong>Requirements:</strong> ingest many invoice formats, extract & validate, run through workflow stages, support 1000+ users.</p>
          <p><strong>Architecture:</strong> upload → blob storage (SAS URLs) → queue → processing workers (parse/OCR/AI extraction) → validation rules engine → persist normalized data (SQL) → workflow state machine (10+ stages) → UI (Vue + Kendo grid) with server-side paging.</p>
          <p><strong>Scaling & reliability:</strong> stateless workers autoscaled on queue depth, idempotent processing keyed by document id, dead-letter for failures, retries with backoff, and audit trail. Use stored procedures/set-based SQL for heavy data operations, Redis cache for reference data, and per-tenant isolation. Report/analytics run off replicas to avoid blocking OLTP.</p>`},
      {lvl:'senior', q:'Design WhatsApp-style messaging (fundamentals check).',
       a:`<p><strong>Core:</strong> persistent connections (WebSocket) via a gateway layer; a message service writes to a store and fans out; presence via heartbeats; delivery/read receipts via acks. <strong>Scale:</strong> shard by user/conversation id, use a pub/sub backplane, and a queue for offline delivery. <strong>Storage:</strong> append-only message store partitioned by conversation; media in blob/CDN. <strong>Ordering:</strong> per-conversation sequence numbers. <strong>Reliability:</strong> at-least-once + client dedupe. Discuss E2E encryption and multi-device sync as extensions.</p>`},
      {lvl:'senior', q:'Design a URL shortener / rate limiter (common warm-ups).',
       a:`<p><strong>Shortener:</strong> generate a short key (base62 of an id or hash), store key→URL in a fast KV store + cache, redirect with 301/302, handle collisions and custom aliases; scale reads with cache/CDN. <strong>Rate limiter:</strong> token bucket / sliding window in Redis keyed by user/IP/API-key; atomic increment with expiry; return 429 + <code>Retry-After</code>. Distributed correctness needs a shared store (Redis) and careful window math.</p>`},
    ]},
    { name:'Scenario & tradeoffs', qs:[
      {lvl:'scenario', q:'Traffic 10×d overnight; the app is slow. What is your triage order?',
       a:`<p>Look at metrics to find the saturated resource: (1) is it the DB (connections, slow queries, replica lag)? add caching/replicas/indexes; (2) app tier CPU/thread pool? autoscale, remove sync-over-async; (3) a downstream dependency? add circuit breaker + fallback + queue; (4) cache stampede? add single-flight + jittered TTL. Apply the quickest safe mitigation (scale out, cache) then fix root cause. Communicate and set up alerts/SLOs.</p>`},
      {lvl:'senior', q:'Strong vs eventual consistency — how do you decide per feature?',
       a:`<p>Ask: what is the cost of a stale/incorrect read? Money/inventory/auth → strong (accept higher latency/lower availability). Feeds, counts, search, dashboards → eventual is fine and scales better. Often you mix: strong writes to the system of record + eventually-consistent read models/caches. Make the choice explicit and document it; don't default everything to strong.</p>`},
    ]},
  ]
});
</script>
<script>
/* ===================== DESIGN PATTERNS & ARCHITECTURE ===================== */
S({
  id:'patterns', cat:'Architecture', icon:'🧩', title:'Design Patterns & Clean Architecture', tag:'Design',
  lede:'SOLID, Clean Architecture, CQRS + MediatR, Repository/Unit of Work, and the GoF patterns you actually use in .NET — with code and tradeoffs.',
  intro:`
    <h2>SOLID in one screen</h2>
    <table>
      <tr><th>Principle</th><th>Meaning</th><th>Smell it fixes</th></tr>
      <tr><td>S — Single Responsibility</td><td>A class has one reason to change</td><td>God classes</td></tr>
      <tr><td>O — Open/Closed</td><td>Open for extension, closed for modification</td><td>Editing switch statements for every new case</td></tr>
      <tr><td>L — Liskov Substitution</td><td>Subtypes must be usable via the base type</td><td>Overrides that throw / change contracts</td></tr>
      <tr><td>I — Interface Segregation</td><td>Prefer small, focused interfaces</td><td>Fat interfaces forcing empty implementations</td></tr>
      <tr><td>D — Dependency Inversion</td><td>Depend on abstractions, not concretions</td><td>High-level code hard-wired to infrastructure</td></tr>
    </table>
    <div class="callout"><span class="t">Clean Architecture in one line</span>Dependencies point inward: Domain (entities, rules) ← Application (use cases, interfaces) ← Infrastructure (EF, HTTP, Redis) & API. The inner layers know nothing about the outer ones, so you can swap infrastructure and test business logic in isolation.</div>
  `,
  groups:[
    { name:'SOLID & principles', qs:[
      {lvl:'intermediate', q:'Give a concrete Open/Closed + Strategy example in C#.',
       a:`<p>Instead of a growing switch for pricing rules, define an interface and inject implementations:</p>
          <pre><code>public interface IPricingRule { bool Applies(Order o); decimal Apply(decimal p); }
// add new rules WITHOUT editing existing code
var price = rules.Where(r =&gt; r.Applies(order))
                 .Aggregate(basePrice, (p, r) =&gt; r.Apply(p));</code></pre>
          <p>New behavior = new class (extension), no modification of tested code. This is Strategy + OCP, ideal for your rule-processing engine.</p>`},
      {lvl:'intermediate', q:'What is Dependency Injection and Inversion of Control?',
       a:`<p><strong>IoC</strong>: the framework, not your code, controls object creation and flow. <strong>DI</strong> is one way to achieve it — dependencies are provided (constructor injection) rather than created internally. Benefits: testability (inject mocks/fakes), swappable implementations, clear dependencies, and centralized lifetime management (the ASP.NET Core container). Avoid the service-locator anti-pattern (hiding dependencies behind a global resolver).</p>`},
      {lvl:'advanced', q:'What is a Liskov Substitution violation? Give an example.',
       a:`<p>A subtype that breaks the base type's contract. Classic: <code>Square : Rectangle</code> where setting width also sets height — code that relies on setting width/height independently breaks. Or an override that throws <code>NotSupportedException</code> for a method the base promises. Fix by modeling correctly (composition, separate abstractions) so any subtype is safely substitutable.</p>`},
    ]},
    { name:'Application patterns', qs:[
      {lvl:'intermediate', q:'Repository + Unit of Work — do you still need them over EF Core?',
       a:`<p>EF Core's <code>DbContext</code> <em>is</em> already a Unit of Work and <code>DbSet</code> a repository. Adding another repository layer is often redundant and can hide EF features (Include, projections). Use a thin repository only to (a) encapsulate complex/reused queries, (b) enforce a boundary for testing, or (c) abstract the data store if you truly might swap it. Otherwise, inject <code>DbContext</code> into application services directly. Be ready to argue both sides.</p>`},
      {lvl:'advanced', q:'What is CQRS and when is it worth it?',
       a:`<p>Command Query Responsibility Segregation separates <strong>writes</strong> (commands that change state) from <strong>reads</strong> (queries that return data), often with different models and even different stores. Benefits: optimized read models (denormalized/cached), independent scaling, clearer code. Worth it when read and write workloads differ greatly or reads need special shapes. Overkill for simple CRUD. Doesn't require event sourcing (they're separate ideas).</p>`},
      {lvl:'advanced', q:'What problem does MediatR solve and what is the tradeoff?',
       a:`<p>MediatR implements the mediator pattern: handlers for commands/queries are decoupled from callers, and cross-cutting concerns (validation, logging, transactions, caching) plug in as <strong>pipeline behaviors</strong> — clean, testable, single-responsibility handlers. Great fit with CQRS + Clean Architecture. Tradeoffs: indirection (harder to navigate), potential overuse for trivial calls, and hidden control flow. Use it where the decoupling and pipeline pay off.</p>`},
      {lvl:'advanced', q:'Show a MediatR pipeline behavior for validation.',
       a:`<pre><code>public class ValidationBehavior&lt;TReq,TRes&gt; : IPipelineBehavior&lt;TReq,TRes&gt; {
  private readonly IEnumerable&lt;IValidator&lt;TReq&gt;&gt; _validators;
  public async Task&lt;TRes&gt; Handle(TReq req, RequestHandlerDelegate&lt;TRes&gt; next, CancellationToken ct){
    var failures = _validators
      .Select(v =&gt; v.Validate(req))
      .SelectMany(r =&gt; r.Errors).Where(e =&gt; e != null).ToList();
    if (failures.Any()) throw new ValidationException(failures);
    return await next();
  }
}</code></pre>
          <p>Every command is validated automatically without touching handlers — OCP + SRP in action.</p>`},
    ]},
    { name:'GoF patterns in practice', qs:[
      {lvl:'basic', q:'Factory vs Abstract Factory vs Builder?',
       a:`<ul><li><strong>Factory Method:</strong> a method decides which concrete type to create (hide <code>new</code>).</li>
          <li><strong>Abstract Factory:</strong> create families of related objects without specifying concrete classes.</li>
          <li><strong>Builder:</strong> construct a complex object step-by-step (your <code>PromptBuilderService</code> is a Builder — assembling a prompt from parts).</li></ul>`},
      {lvl:'intermediate', q:'Strategy vs Template Method vs State?',
       a:`<p><strong>Strategy:</strong> swap interchangeable algorithms at runtime via composition (inject an <code>IPricingRule</code>). <strong>Template Method:</strong> a base class defines the skeleton, subclasses fill steps (inheritance). <strong>State:</strong> behavior changes with an internal state object (workflow stages transitioning) — great for your 10+ invoice workflow stages modeled as a state machine.</p>`},
      {lvl:'intermediate', q:'Observer, Adapter and Decorator — where do they show up in .NET?',
       a:`<ul><li><strong>Observer:</strong> events / <code>IObservable</code> / pub-sub (SignalR, domain events).</li>
          <li><strong>Adapter:</strong> wrap an incompatible API to fit your interface (wrapping a third-party SDK behind your own abstraction).</li>
          <li><strong>Decorator:</strong> wrap a component to add behavior (caching/logging decorators around a service, or ASP.NET Core middleware which is decorator-like around the request).</li></ul>`},
      {lvl:'advanced', q:'When is the Singleton pattern a problem?',
       a:`<p>Global mutable singletons hide dependencies, complicate testing (shared state across tests), and can cause thread-safety and lifetime bugs. In .NET, prefer a DI-registered singleton (managed lifetime, injectable, mockable) over a static <code>Instance</code>. Ensure it's stateless or thread-safe. Never inject scoped services (like DbContext) into a singleton.</p>`},
    ]},
    { name:'Scenario', qs:[
      {lvl:'scenario', q:'A service class has grown to 1500 lines and is hard to test. How do you refactor?',
       a:`<p>Identify distinct responsibilities and extract them (SRP) into focused collaborators injected via interfaces (DIP) for testability. Replace big conditionals with Strategy/polymorphism (OCP). Move cross-cutting concerns to decorators/pipeline behaviors. Introduce a use-case layer (application services / MediatR handlers). Refactor behind tests: characterize current behavior first, extract in small steps, keep it green. Measure via reduced cyclomatic complexity and faster unit tests.</p>`},
    ]},
  ]
});
</script>
<script>
/* ===================== DSA / CODING ===================== */
S({
  id:'dsa', cat:'Coding', icon:'💻', title:'Coding Interview Prep (DSA)', tag:'Algorithms',
  lede:'Curated data structures & algorithms problems by topic and difficulty, each with approach, complexity, common mistakes, and a solution in C#/JS.',
  intro:`
    <h2>Study order & patterns</h2>
    <ol>
      <li><strong>Arrays / Strings / Hashing</strong> — foundational; hash maps solve a huge fraction of problems in O(n).</li>
      <li><strong>Two Pointers / Sliding Window</strong> — subarray/substring optimizations.</li>
      <li><strong>Stack / Queue / Linked List</strong> — order and structure manipulation.</li>
      <li><strong>Binary Search</strong> — on sorted data and on the "answer space".</li>
      <li><strong>Trees / BST / Heaps / Tries</strong> — hierarchical + priority + prefix problems.</li>
      <li><strong>Graphs (BFS/DFS/Topo/Dijkstra)</strong> — connectivity, shortest paths.</li>
      <li><strong>Backtracking</strong> — combinations, permutations, constraints.</li>
      <li><strong>Dynamic Programming / Greedy</strong> — optimization; hardest to master.</li>
    </ol>
    <h2>Complexity cheat sheet</h2>
    <table>
      <tr><th>Structure</th><th>Access</th><th>Search</th><th>Insert</th><th>Delete</th></tr>
      <tr><td>Array</td><td>O(1)</td><td>O(n)</td><td>O(n)</td><td>O(n)</td></tr>
      <tr><td>Hash map</td><td>—</td><td>O(1) avg</td><td>O(1) avg</td><td>O(1) avg</td></tr>
      <tr><td>Balanced BST</td><td>—</td><td>O(log n)</td><td>O(log n)</td><td>O(log n)</td></tr>
      <tr><td>Heap</td><td>O(1) peek</td><td>O(n)</td><td>O(log n)</td><td>O(log n)</td></tr>
      <tr><td>Linked list</td><td>O(n)</td><td>O(n)</td><td>O(1)*</td><td>O(1)*</td></tr>
    </table>
    <div class="callout tip"><span class="t">Interview method</span>Clarify → examples/edge cases → brute force + complexity → optimize (which pattern?) → code cleanly → test with edge cases → state final complexity. Think out loud.</div>
  `,
  groups:[
    { name:'Arrays, Strings & Hashing', qs:[
      {lvl:'basic', q:'Two Sum — return indices of two numbers adding to target. [Easy · very high frequency]',
       a:`<p><strong>Brute force:</strong> check all pairs O(n²). <strong>Optimized:</strong> one-pass hash map storing value→index; for each x, look for <code>target - x</code>.</p>
          <pre><code>int[] TwoSum(int[] nums, int target){
  var seen = new Dictionary&lt;int,int&gt;();
  for (int i = 0; i &lt; nums.Length; i++){
    int need = target - nums[i];
    if (seen.TryGetValue(need, out int j)) return new[]{ j, i };
    seen[nums[i]] = i;
  }
  return Array.Empty&lt;int&gt;();
}</code></pre>
          <p><strong>Time</strong> O(n), <strong>Space</strong> O(n). <strong>Mistakes:</strong> using the same element twice; adding to the map before checking.</p>`},
      {lvl:'intermediate', q:'Group Anagrams. [Medium · common]',
       a:`<p>Key each word by its sorted characters (or a 26-count signature) and group in a hash map.</p>
          <pre><code>var map = new Dictionary&lt;string, List&lt;string&gt;&gt;();
foreach (var w in words){
  var key = String.Concat(w.OrderBy(c =&gt; c));
  if (!map.ContainsKey(key)) map[key] = new();
  map[key].Add(w);
}</code></pre>
          <p><strong>Time</strong> O(n·k log k) (sort key) or O(n·k) with count key; <strong>Space</strong> O(n·k). <strong>Mistake:</strong> comparing words pairwise (O(n²)).</p>`},
      {lvl:'intermediate', q:'Longest Substring Without Repeating Characters. [Medium · very high frequency]',
       a:`<p>Sliding window + last-seen index map. Expand right; when a repeat is inside the window, jump left past its previous index.</p>
          <pre><code>int LengthOfLongest(string s){
  var last = new Dictionary&lt;char,int&gt;(); int start = 0, best = 0;
  for (int i = 0; i &lt; s.Length; i++){
    if (last.TryGetValue(s[i], out int p) &amp;&amp; p &gt;= start) start = p + 1;
    last[s[i]] = i;
    best = Math.Max(best, i - start + 1);
  }
  return best;
}</code></pre>
          <p><strong>Time</strong> O(n), <strong>Space</strong> O(min(n,charset)). <strong>Mistake:</strong> not guarding <code>p &gt;= start</code>, shrinking window incorrectly.</p>`},
      {lvl:'advanced', q:'Product of Array Except Self (no division). [Medium]',
       a:`<p>Two passes: prefix products left→right, then suffix products right→left multiplied in.</p>
          <pre><code>int[] Product(int[] n){
  int len = n.Length; var res = new int[len];
  res[0] = 1;
  for (int i = 1; i &lt; len; i++) res[i] = res[i-1] * n[i-1];
  int right = 1;
  for (int i = len-1; i &gt;= 0; i--){ res[i] *= right; right *= n[i]; }
  return res;
}</code></pre>
          <p><strong>Time</strong> O(n), <strong>Space</strong> O(1) extra. <strong>Trap:</strong> handling zeros — this approach handles them naturally; division would not.</p>`},
    ]},
    { name:'Two Pointers & Sliding Window', qs:[
      {lvl:'intermediate', q:'Valid Palindrome (alphanumeric, case-insensitive). [Easy]',
       a:`<p>Two pointers from both ends, skip non-alphanumeric, compare lowercased.</p>
          <pre><code>bool IsPalindrome(string s){
  int i = 0, j = s.Length - 1;
  while (i &lt; j){
    while (i &lt; j &amp;&amp; !char.IsLetterOrDigit(s[i])) i++;
    while (i &lt; j &amp;&amp; !char.IsLetterOrDigit(s[j])) j--;
    if (char.ToLower(s[i]) != char.ToLower(s[j])) return false;
    i++; j--;
  }
  return true;
}</code></pre>
          <p>O(n) time, O(1) space. <strong>Mistake:</strong> building a filtered string (O(n) space) when in-place pointers suffice.</p>`},
      {lvl:'advanced', q:'Minimum Window Substring. [Hard · frequent at top companies]',
       a:`<p>Sliding window with a need-count map; expand right until all target chars covered, then shrink left to minimize while still valid.</p>
          <p>Maintain <code>need</code> counts and a <code>missing</code> counter. When <code>missing == 0</code>, record/shrink. <strong>Time</strong> O(n), <strong>Space</strong> O(charset). <strong>Mistakes:</strong> off-by-one on window bounds; not tracking counts correctly when shrinking.</p>`},
      {lvl:'intermediate', q:'Container With Most Water. [Medium]',
       a:`<p>Two pointers at the ends; area = min(height)·width. Move the shorter side inward (moving the taller can't increase the limiting height).</p>
          <pre><code>int MaxArea(int[] h){
  int i = 0, j = h.Length - 1, best = 0;
  while (i &lt; j){
    best = Math.Max(best, Math.Min(h[i], h[j]) * (j - i));
    if (h[i] &lt; h[j]) i++; else j--;
  }
  return best;
}</code></pre>
          <p>O(n)/O(1). <strong>Trap:</strong> greedy proof — moving the shorter pointer is what guarantees you don't miss a larger area.</p>`},
    ]},
    { name:'Linked List, Stack & Queue', qs:[
      {lvl:'basic', q:'Reverse a linked list. [Easy · fundamental]',
       a:`<pre><code>Node Reverse(Node head){
  Node prev = null, cur = head;
  while (cur != null){
    var next = cur.Next;
    cur.Next = prev; prev = cur; cur = next;
  }
  return prev;
}</code></pre>
          <p>O(n)/O(1). <strong>Mistake:</strong> losing the <code>next</code> pointer before reassigning. Recursive version is O(n) space (stack).</p>`},
      {lvl:'intermediate', q:'Detect a cycle in a linked list. [Easy/Medium]',
       a:`<p>Floyd's tortoise & hare: slow moves 1, fast moves 2; they meet iff there's a cycle. To find the start, reset one pointer to head and advance both by 1 until they meet.</p>
          <p>O(n) time, O(1) space. <strong>Alternative:</strong> hash set of visited nodes (O(n) space).</p>`},
      {lvl:'intermediate', q:'Valid Parentheses. [Easy · very common]',
       a:`<p>Push opens onto a stack; on a close, the top must be the matching open. Valid iff every close matches and the stack ends empty.</p>
          <pre><code>bool Valid(string s){
  var st = new Stack&lt;char&gt;();
  var pairs = new Dictionary&lt;char,char&gt;{[')']='(',[']']='[',['}']='{'};
  foreach (var c in s){
    if (pairs.ContainsValue(c)) st.Push(c);
    else if (st.Count == 0 || st.Pop() != pairs[c]) return false;
  }
  return st.Count == 0;
}</code></pre>
          <p>O(n)/O(n). <strong>Mistake:</strong> forgetting the final empty-stack check.</p>`},
      {lvl:'advanced', q:'Implement an LRU cache. [Medium · very high frequency]',
       a:`<p>Hash map (key→node) + doubly linked list for O(1) get/put. On access, move node to front; on insert over capacity, evict the tail. In C#, <code>Dictionary</code> + <code>LinkedList&lt;T&gt;</code> gives O(1) via stored <code>LinkedListNode</code> references.</p>
          <p>O(1) get/put, O(capacity) space. <strong>Trap:</strong> updating both the map and list on eviction; a plain <code>OrderedDictionary</code> reorder can be O(n) if done naively.</p>`},
    ]},
    { name:'Trees, BST & Heaps', qs:[
      {lvl:'basic', q:'Max depth / invert a binary tree. [Easy]',
       a:`<p>Recursive DFS. Depth: <code>1 + max(depth(left), depth(right))</code>. Invert: swap children then recurse. Both O(n) time, O(h) space (recursion stack; h = height).</p>
          <pre><code>TreeNode Invert(TreeNode r){
  if (r == null) return null;
  (r.Left, r.Right) = (Invert(r.Right), Invert(r.Left));
  return r;
}</code></pre>`},
      {lvl:'intermediate', q:'Validate a Binary Search Tree. [Medium · common trap]',
       a:`<p>Each node must lie within an (min, max) range that tightens as you descend — not just be greater/less than its immediate parent.</p>
          <pre><code>bool Valid(TreeNode n, long lo, long hi){
  if (n == null) return true;
  if (n.Val &lt;= lo || n.Val &gt;= hi) return false;
  return Valid(n.Left, lo, n.Val) &amp;&amp; Valid(n.Right, n.Val, hi);
}
// call Valid(root, long.MinValue, long.MaxValue)</code></pre>
          <p><strong>Classic mistake:</strong> only comparing node to its parent — fails for deep violations. In-order traversal (must be strictly increasing) also works.</p>`},
      {lvl:'advanced', q:'Kth largest element (or top-K). [Medium]',
       a:`<p>Maintain a <strong>min-heap</strong> of size k; push each element, pop when size exceeds k; the root is the kth largest. O(n log k) time, O(k) space — better than sorting O(n log n) when k ≪ n. <code>Quickselect</code> gives average O(n).</p>`},
      {lvl:'intermediate', q:'Lowest Common Ancestor in a BST. [Medium]',
       a:`<p>Use BST ordering: if both values &lt; node, go left; if both &gt;, go right; otherwise the split point is the LCA. O(h) time, O(1) iterative.</p>`},
    ]},
    { name:'Graphs & Backtracking', qs:[
      {lvl:'intermediate', q:'Number of Islands. [Medium · very common]',
       a:`<p>Grid DFS/BFS: iterate cells; on an unvisited '1', flood-fill its connected land and increment the count. O(rows·cols) time, O(rows·cols) space worst case (stack/queue).</p>
          <p><strong>Mistake:</strong> not marking visited (infinite recursion) or mutating input when you shouldn't.</p>`},
      {lvl:'advanced', q:'Course Schedule / detect cycle in a directed graph (topological sort). [Medium]',
       a:`<p>Model prerequisites as a DAG. <strong>Kahn's algorithm:</strong> compute in-degrees, repeatedly remove zero-in-degree nodes; if you can't process all nodes, there's a cycle (impossible schedule). Alternatively DFS with coloring (white/gray/black) detects back-edges. O(V+E).</p>`},
      {lvl:'advanced', q:'Word Search / Subsets / Permutations (backtracking template). [Medium]',
       a:`<p>Backtracking explores choices, recurses, then undoes the choice.</p>
          <pre><code>void Backtrack(List&lt;int&gt; path, bool[] used){
  if (path.Count == nums.Length){ results.Add(new(path)); return; }
  for (int i = 0; i &lt; nums.Length; i++){
    if (used[i]) continue;
    used[i] = true; path.Add(nums[i]);
    Backtrack(path, used);
    path.RemoveAt(path.Count-1); used[i] = false; // undo
  }
}</code></pre>
          <p>Permutations: O(n·n!). <strong>Trap:</strong> forgetting to undo state; handling duplicates needs sorting + skip.</p>`},
      {lvl:'advanced', q:'Shortest path in a weighted graph — which algorithm?',
       a:`<p>Non-negative weights → <strong>Dijkstra</strong> with a min-heap, O((V+E) log V). Unweighted → BFS. Negative weights → Bellman-Ford O(VE) (detects negative cycles). All-pairs → Floyd-Warshall O(V³). Know when each applies and their complexities.</p>`},
    ]},
    { name:'Dynamic Programming & Greedy', qs:[
      {lvl:'intermediate', q:'Climbing Stairs / Fibonacci — DP intro. [Easy]',
       a:`<p>Ways(n) = Ways(n-1) + Ways(n-2). Bottom-up with two rolling variables → O(n) time, O(1) space. Teaches overlapping subproblems + optimal substructure, the DP hallmarks.</p>`},
      {lvl:'advanced', q:'0/1 Knapsack — describe the DP. [Medium/Hard]',
       a:`<p><code>dp[i][w]</code> = max value using first i items with capacity w. Transition: skip item i (<code>dp[i-1][w]</code>) or take it if it fits (<code>value[i] + dp[i-1][w-wt[i]]</code>). O(n·W) time; can compress to O(W) space iterating weights descending. <strong>Trap:</strong> iterating capacity in wrong order breaks the 0/1 (vs unbounded) constraint.</p>`},
      {lvl:'advanced', q:'Longest Common Subsequence / Edit Distance. [Medium]',
       a:`<p>2D DP over the two strings. LCS: if chars match, <code>1 + dp[i-1][j-1]</code>, else <code>max(dp[i-1][j], dp[i][j-1])</code>. Edit distance adds insert/delete/replace transitions. O(m·n) time and space (compressible to O(min(m,n))). Foundational for diff tools and fuzzy matching.</p>`},
      {lvl:'intermediate', q:'Coin Change (min coins). [Medium]',
       a:`<p>Unbounded DP: <code>dp[a] = min over coins c of dp[a-c] + 1</code>, <code>dp[0]=0</code>. O(amount·coins). <strong>Greedy fails</strong> for arbitrary denominations (e.g., coins {1,3,4}, amount 6 → greedy 4+1+1=3 coins, optimal 3+3=2). Know why greedy is unsafe here.</p>`},
      {lvl:'advanced', q:'When is greedy correct vs when do you need DP?',
       a:`<p>Greedy works only when the problem has the <strong>greedy-choice property</strong> and optimal substructure (local optimum → global optimum), e.g., interval scheduling, Huffman, Dijkstra. When choices interact and a locally optimal pick can hurt globally (coin change with odd denominations, knapsack), you need DP to consider combinations. Prove greedy correctness (exchange argument) before trusting it.</p>`},
    ]},
  ]
});
</script>
<script>
/* ===================== PROJECT DEEP DIVES ===================== */
S({
  id:'project-ai', cat:'Project Deep Dives', icon:'🧵', title:'Project 1 — AI Garment Costing Platform', tag:'Challenge every claim',
  lede:'Deep-dive questions an interviewer will use to pressure-test your AI costing platform (Azure AI Foundry, .NET 10, single LLM agent, 11-tool function-calling loop, SSE streaming, PromptBuilder, multi-tenant).',
  intro:`
    <div class="intro">
      <h2>Resume bullets under examination</h2>
      <ul>
        <li>AI-driven garment costing platform on <strong>Azure AI Foundry + .NET 10</strong>; replaced a rigid multi-agent architecture with a <strong>single LLM agent + 11-tool function-calling loop</strong>; analysis time down <strong>60–70%</strong>.</li>
        <li>Real-time AI response <strong>streaming via SSE + Channels + ReadableStream</strong>; first token &lt; <strong>400ms</strong>.</li>
        <li><strong>Hybrid rule-processing engine</strong>: natural language → structured conditions/actions; LLM reasoning + deterministic validation across <strong>50+ rule categories</strong>.</li>
        <li><strong>Multi-tenant</strong> platform on EF Core, SQL Server, Redis, Azure Blob Storage, Polly; <strong>20+ tenants</strong>; expiring <strong>SAS URLs</strong>.</li>
        <li><strong>PromptBuilderService</strong> with Semantic Kernel; token consumption down <strong>40%</strong>.</li>
      </ul>
      <div class="callout warn"><span class="t">Golden rule</span>For every metric (60–70%, 400ms, 40%, 20+), be ready to explain: how you measured it, the baseline, and what specifically caused the improvement. Vague numbers get punished.</div>
    </div>
  `,
  groups:[
    { name:'Architecture & the single-agent decision', qs:[
      {lvl:'senior', q:'Why replace a multi-agent architecture with a single agent? What did you lose?',
       a:`<p>The multi-agent design added coordination overhead, extra LLM round-trips (latency + cost), and a large debugging/maintenance surface for a problem that didn't truly need role specialization. A single agent with a well-designed toolset (11 tools) let one model orchestrate deterministic operations directly — simpler, faster, cheaper, and easier to reason about, which drove the 60–70% analysis-time reduction. What you <em>lose</em>: potential parallelism and specialized reasoning per role. Mitigation: if a sub-problem later needs specialization, you can reintroduce a focused sub-agent — but only when justified by evidence, not by default.</p>`},
      {lvl:'senior', q:'How did you measure the 60–70% analysis-time reduction?',
       a:`<p>Define the metric precisely: end-to-end time from request to final costing result, measured over a representative sample of costing scenarios, before (multi-agent) vs after (single-agent). Sources of the gain: fewer inter-agent LLM calls, parallelizable/deterministic tool execution, token-optimized prompts, and streaming for perceived latency. I'd present it as median + p95 over N runs, not a single lucky number, and note variance from model latency.</p>`},
      {lvl:'advanced', q:'Walk me through the 11-tool function-calling loop end to end.',
       a:`<p>Messages + tool schemas → model. If the model requests tool calls, dispatch each to a deterministic C# handler (e.g., material lookup, labor rate, overhead calc, rule validation, currency conversion), append results as tool messages, and loop so the model can chain and synthesize. Terminate on a final answer or when guardrails trip (max iterations, timeout). Each tool has a strict JSON schema, argument validation, and logging. The model provides reasoning/orchestration; the tools provide correctness.</p>`},
      {lvl:'senior', q:'How do you prevent the tool loop from running forever or exploding cost?',
       a:`<p>Max-iteration cap, per-tool + overall timeouts, detection of repeated identical calls, token/cost budget per request, tool allow-list, and structured logging of every step. Tools are idempotent so retries are safe. If the budget is hit, return the best partial result or a graceful failure rather than looping.</p>`},
    ]},
    { name:'Streaming & real-time', qs:[
      {lvl:'advanced', q:'Why SSE over WebSockets for AI streaming, and how does the pipeline work?',
       a:`<p>The data flow is <strong>one-directional</strong> (server → client tokens), which is exactly SSE's model — simpler than WebSockets, works over plain HTTP, auto-reconnects, and needs no special infra. Pipeline: LLM token stream → a bounded <code>Channel&lt;T&gt;</code> (backpressure) → the API writes <code>data:</code> events to the response → browser <code>EventSource</code>/<code>ReadableStream</code> renders tokens as they arrive. WebSockets would be warranted only if the client needed to stream <em>to</em> the server mid-generation.</p>`},
      {lvl:'advanced', q:'How did you achieve first-token < 400ms?',
       a:`<p>Minimize work before the first model call: precomputed/cached context, a lean system prompt, and starting the stream as soon as the first token arrives (no buffering the full response). Keep the app in the same region as the model, reuse HTTP connections, and avoid synchronous pre-processing. First-token latency is dominated by model time-to-first-token + network, so we trimmed everything on the critical path before it.</p>`},
      {lvl:'scenario', q:'A user closes the tab mid-stream. What happens on the server?',
       a:`<p>The client disconnect cancels <code>HttpContext.RequestAborted</code>; we thread that <code>CancellationToken</code> into the LLM call and tool dispatch so we stop generating (and stop paying) immediately. The channel completes, resources release. Without cancellation propagation, the model would keep generating tokens into a dead connection, wasting cost and capacity.</p>`},
    ]},
    { name:'Rule engine & correctness', qs:[
      {lvl:'senior', q:'How does the hybrid rule engine combine LLM reasoning with deterministic validation?',
       a:`<p>The LLM interprets natural-language business requirements into a <strong>structured</strong> representation (conditions + actions) using strict schema/function-calling output. That structure is then executed and validated by <strong>deterministic</strong> code across 50+ rule categories — no pricing decision depends on free-form model text. This gives the flexibility of NL input with the reliability/auditability of code. If validation fails or is ambiguous, we reject or ask for clarification rather than guessing.</p>`},
      {lvl:'senior', q:'How do you ensure a costing result is reproducible and auditable?',
       a:`<p>Low/zero temperature for structured steps, deterministic tools as the source of truth for numbers, and full logging of inputs, retrieved context, tool calls + arguments + results, and final output. The structured rule representation is persisted so a given input reproduces the same computation. Auditors can trace exactly which rules fired and why — critical for costing that affects real money.</p>`},
      {lvl:'advanced', q:'What happens when the LLM produces an invalid or out-of-range structured output?',
       a:`<p>Schema validation rejects it; we can re-ask with the validation error (self-correction), fall back to a stricter prompt, or surface a clarification request to the user. Deterministic guards (ranges, referential checks against the DB) catch semantically-invalid-but-schema-valid outputs. The system never applies an unvalidated action.</p>`},
    ]},
    { name:'Multi-tenancy, data & resilience', qs:[
      {lvl:'senior', q:'How do you isolate 20+ tenants and prevent cross-tenant data/AI leakage?',
       a:`<p>Defense in depth: tenant resolved from the authenticated principal (never client body) into a scoped context; EF Core global query filters on <code>TenantId</code>; tenant-prefixed cache keys and separate blob containers/prefixes; per-tenant retrieval scoping for any AI grounding; and per-tenant quotas. I'd explicitly test that tenant A can never retrieve or influence tenant B's context — including in prompts and vector search.</p>`},
      {lvl:'advanced', q:'Why expiring SAS URLs for documents, and what are the risks?',
       a:`<p>SAS (Shared Access Signature) URLs grant time-limited, scoped access to a blob without exposing storage keys, so the browser can fetch directly from Blob Storage (offloading the API). Risks: a leaked URL is valid until expiry — mitigate with short TTLs, least-privilege (read-only, single blob), HTTPS-only, and ideally user-delegation SAS tied to identity. Never issue long-lived or container-wide SAS.</p>`},
      {lvl:'production', q:'How do Polly and Redis make the platform resilient?',
       a:`<p><strong>Polly</strong> wraps Azure AI + external calls with retries (backoff + jitter), circuit breaker, and timeouts so transient failures/throttling don't cascade — key for dependable Azure AI connectivity. <strong>Redis</strong> offloads hot reads (reference data, session), enables rate limiting and caching of deterministic results, and can act as a distributed lock/dedupe. Together they protect latency and availability under load and dependency hiccups.</p>`},
      {lvl:'scenario', q:'Azure OpenAI starts returning 429s during peak. How does the system behave?',
       a:`<p>Polly honors <code>Retry-After</code> with capped exponential backoff; the circuit breaker opens if failures persist to avoid retry storms. We degrade gracefully — queue non-urgent work, serve cached results where valid, or return a clear "busy, retry" to the user — rather than failing hard. Longer term: provisioned throughput (PTU), load spreading, and model cascade to reduce demand on the constrained deployment.</p>`},
    ]},
    { name:'Tradeoffs & alternatives', qs:[
      {lvl:'senior', q:'Why LLM + tools instead of a pure rules engine or pure ML model?',
       a:`<p>A pure rules engine can't parse free-form natural-language requirements flexibly; a pure ML model lacks the deterministic, auditable arithmetic costing needs. The hybrid — LLM for understanding/orchestration, deterministic tools/rules for computation and validation — gets flexibility <em>and</em> correctness. If requirements were fully structured and stable, a rules engine alone would be simpler and I'd choose that; the NL flexibility is what justifies the LLM.</p>`},
      {lvl:'senior', q:'If you rebuilt this today, what would you change?',
       a:`<p>Honest answer signals seniority: invest earlier in an <strong>evaluation harness</strong> (golden costing cases, groundedness/accuracy metrics) to catch regressions on model/prompt changes; add richer observability/tracing per tool call from day one; formalize the rule schema with versioning; and consider a model cascade for cost. I'd also load-test streaming under concurrency early to validate the 400ms target at scale.</p>`},
    ]},
  ]
});

S({
  id:'project-invoice', cat:'Project Deep Dives', icon:'🧾', title:'Project 2 — Invoice Automation Platform', tag:'Challenge every claim',
  lede:'Deep-dive questions on modernizing a legacy desktop invoicing app into a web platform (Vue 3, Kendo UI, .NET Core, SQL Server + PostgreSQL, 1000+ users, 10+ workflow stages).',
  intro:`
    <div class="intro">
      <h2>Resume bullets under examination</h2>
      <ul>
        <li>Led modernization of a <strong>legacy desktop app</strong> into a scalable web platform for <strong>1000+ users</strong>, adding <strong>20+ capabilities</strong>.</li>
        <li><strong>10+ features</strong> enabling <strong>5+ personalized settings</strong> per tenant; <strong>+30% user satisfaction</strong>.</li>
        <li>Rapidly learned <strong>Vue.js + 10+ advanced Kendo UI components</strong>.</li>
        <li>Multiple invoice-processing modules across <strong>10+ workflow stages</strong> and validation.</li>
        <li>Complex SQL schemas for multiple invoice formats; <strong>stored procedures, triggers, functions</strong> for performance & integrity.</li>
      </ul>
    </div>
  `,
  groups:[
    { name:'Modernization strategy', qs:[
      {lvl:'senior', q:'How do you approach migrating a legacy desktop app to the web without a risky big-bang?',
       a:`<p>Prefer <strong>incremental</strong> migration: understand the domain, carve out modules, and use a strangler-fig approach — stand up the new web platform alongside the legacy app and migrate feature-by-feature, redirecting traffic as each is proven. Keep a shared data layer or sync during transition. This de-risks by shipping value early, allowing rollback per feature, and avoiding a multi-month freeze. Big-bang rewrites are risky; I'd only do that if the legacy stack blocks it entirely.</p>`},
      {lvl:'senior', q:'How did you validate the +30% user satisfaction claim?',
       a:`<p>Be concrete: surveys/NPS before vs after, task-completion time, support-ticket volume, and feature-adoption metrics. The drivers: web access (no install/deploy friction), 20+ new capabilities, and 5+ personalization settings reducing repetitive work. I'd present the measurement method and acknowledge confounders rather than claim the number is exact.</p>`},
      {lvl:'advanced', q:'What challenges did moving from desktop to web introduce?',
       a:`<p>Statelessness (desktop kept in-memory state; web needs server/session state, auth, concurrency), multi-user concurrency and locking, network latency (chattier UIs feel slow → batch/async), security (now internet-exposed → authz, input validation, HTTPS), and deployment/observability. Also UX parity — power users expect desktop-grade grids, which is where Kendo UI came in.</p>`},
    ]},
    { name:'Frontend (Vue 3 + Kendo UI)', qs:[
      {lvl:'intermediate', q:'How did you handle large invoice datasets in Kendo grids performantly?',
       a:`<p>Push paging/sorting/filtering to the server (server-side operations) instead of loading everything client-side; enable virtual scrolling so only visible rows render; debounce filter input; and project only needed columns from the API. This keeps the UI responsive even with large invoice volumes and avoids freezing the browser.</p>`},
      {lvl:'intermediate', q:'How did you manage state and configuration for 5+ per-tenant personalized settings?',
       a:`<p>Settings resolved per authenticated tenant/user from the API, cached client-side, and applied reactively (Vue refs/computed) to drive UI behavior (default views, column layouts, validation preferences). Server-side they're stored per tenant (with sensible defaults) and enforced in APIs — the client can't be trusted as the source of truth. Composables encapsulate reading/applying settings to avoid duplication.</p>`},
      {lvl:'advanced', q:'How do you avoid losing reactivity or causing excess re-renders in Vue 3?',
       a:`<p>Use <code>ref</code>/<code>reactive</code> correctly (don't destructure reactive objects — use <code>toRefs</code>), prefer <code>computed</code> for derived values (cached), keep component state minimal, use <code>v-once</code>/<code>v-memo</code> for static/expensive subtrees, and key list items stably. For heavy Kendo components, wrap them in composables and avoid re-instantiating on every parent render.</p>`},
    ]},
    { name:'Workflow, data & SQL', qs:[
      {lvl:'advanced', q:'How did you model 10+ invoice workflow stages?',
       a:`<p>As a <strong>state machine</strong>: explicit states (e.g., received → validated → matched → approved → posted → paid), allowed transitions, and guards per transition. Persist current state + history/audit. This makes valid paths explicit, prevents illegal transitions, and supports resuming/reporting. Business rules attach to transitions rather than being scattered through the UI.</p>`},
      {lvl:'advanced', q:'How do you design schemas to support multiple invoice formats?',
       a:`<p>Normalize the common core (header, line items, totals, tenant, status) into relational tables, and handle format-specific/variable fields via a flexible extension (typed extension tables or a JSON/jsonb column for sparse attributes). Validate on ingestion into the normalized model. This balances query performance and constraints for common fields with flexibility for format variance — avoiding a brittle column-per-format explosion.</p>`},
      {lvl:'senior', q:'When did you use stored procedures/triggers/functions and how do you keep them maintainable?',
       a:`<p>Used procedures for set-based, data-intensive operations (bulk validation, posting) where round-tripping rows to the app would be slow, functions for reusable computed values, and triggers for auditing/integrity that must never be bypassed. Maintainability: keep them <strong>version-controlled and migrated</strong> like code, documented, tested, and reserved for where they clearly win — business/domain logic stays in the app to remain testable and portable. Overusing triggers hides behavior, so I kept them narrow and well-commented.</p>`},
      {lvl:'scenario', q:'Two users edit the same invoice simultaneously. How do you prevent lost updates?',
       a:`<p>Optimistic concurrency: a rowversion/timestamp column; on save, the update includes the original version in the WHERE clause. If someone else changed it, zero rows update and we surface a conflict (reload/merge) instead of silently overwriting. For high-contention stages I'd use a short pessimistic lock or a workflow assignment so only one user owns a stage at a time.</p>`},
    ]},
  ]
});
</script>
<script>
/* ===================== BEHAVIORAL / MOCK INTERVIEW ===================== */
S({
  id:'behavioral', cat:'Interview Prep', icon:'🗣️', title:'Behavioral & Mock Interview', tag:'STAR',
  lede:'HR, leadership, ownership, conflict, and AI-project questions with model answers using the STAR method — grounded in your actual resume experience.',
  intro:`
    <div class="intro">
      <h2>The STAR method</h2>
      <p><strong>S</strong>ituation → <strong>T</strong>ask → <strong>A</strong>ction (what <em>you</em> did) → <strong>R</strong>esult (quantified). Keep it ~2 minutes. Emphasize your specific decisions and impact, not "we".</p>
      <div class="callout tip"><span class="t">Map stories to resume bullets</span>Prepare 5–6 flexible stories: the single-agent migration (technical leadership + tradeoffs), the legacy→web modernization (ownership + scale), the token/40% optimization (impact), a production incident (resilience), learning Vue+Kendo fast (adaptability), and a conflict/disagreement.</div>
    </div>
  `,
  groups:[

    <h2>.NET one-liners</h2>
    <ul>
      <li>async ≠ threads; it frees the thread during I/O. Never block with <code>.Result</code>/<code>.Wait()</code>.</li>
      <li>Scoped-in-Singleton = captive dependency bug. DbContext is scoped + not thread-safe.</li>
      <li>ValueTask for hot sync-completing paths; don't await it twice.</li>
      <li>Gen0 cheap, Gen2/LOH expensive. Server GC for web. Bound your caches.</li>
      <li>Middleware order: exception → https → routing → authN → authZ → endpoints.</li>
    </ul>

    <h2>Data one-liners</h2>
    <ul>
      <li>Fix N+1 with <code>Include</code>/projection; use <code>AsNoTracking</code> for reads; <code>AsSplitQuery</code> for multi-collection.</li>
      <li>Covering index (INCLUDE) kills key lookups. Don't wrap indexed columns in functions.</li>
      <li>Read Committed is default; RCSI/Snapshot = readers don't block writers.</li>
      <li>Optimistic concurrency = rowversion in WHERE; handle <code>DbUpdateConcurrencyException</code>.</li>
      <li>Redis cache-aside: read-through + invalidate-on-write + TTL + stampede guard.</li>
    </ul>

    <h2>AI one-liners</h2>
    <ul>
      <li>LLMs are stateless next-token predictors; everything lives in the context window (tokens = cost + limit).</li>
      <li>RAG = chunk → embed → retrieve (hybrid + rerank) → grounded generate → evaluate.</li>
      <li>Function calling: model requests, your deterministic code executes, loop with guardrails (max iters, timeout).</li>
      <li>Single-agent: simpler/cheaper/faster; multi-agent only when specialization truly pays.</li>
      <li>Reduce hallucination: ground + "only from context" + low temp + citations + eval.</li>
      <li>Prompt injection: treat external text as data; never let raw output trigger privileged actions.</li>
      <li>Cut cost: prompt caching, model cascade, top-k retrieval, cap max_tokens, compact JSON.</li>
    </ul>

    <h2>System design one-liners</h2>
    <ul>
      <li>Framework: requirements → estimate → components → data/API → deep-dive → scale/fail/secure → tradeoffs.</li>
      <li>Stateless app tier + LB + Redis + replicas; DB is usually the first bottleneck.</li>
      <li>Queues decouple + absorb spikes but need idempotent consumers (at-least-once).</li>
      <li>CAP: pick per-operation. Payments → CP; feeds/counts → AP/eventual.</li>
      <li>Multi-tenant: shared-DB + TenantId filters first; dedicated DB for big tenants.</li>
    </ul>
