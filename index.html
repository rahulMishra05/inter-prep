S({
  id:'dotnet', cat:'Backend Masterclass', icon:'🟣', title:'.NET & C#', tag:'Core',
  lede:'C#, the CLR, memory & GC, async/await, threading, and language features — the backbone of every .NET role on your resume (.NET 10, ASP.NET Core).',
  intro:`
    <h2>Topics to cover before the interview</h2>
    <h3>Beginner</h3>
    <ul>
      <li>Value vs reference types, stack vs heap, boxing/unboxing</li>
      <li>Strings & immutability, <code>StringBuilder</code>, string interning</li>
      <li>Collections: List, Dictionary, HashSet, arrays; Big-O of each</li>
      <li>OOP: classes, interfaces, inheritance, polymorphism, abstract vs virtual</li>
      <li>Properties, indexers, <code>readonly</code> vs <code>const</code>, access modifiers</li>
    </ul>
    <h3>Intermediate</h3>
    <ul>
      <li>Generics, constraints, covariance/contravariance</li>
      <li>Delegates, events, <code>Func/Action/Predicate</code>, lambdas, closures</li>
      <li>LINQ (deferred vs immediate execution), <code>IEnumerable</code> vs <code>IQueryable</code></li>
      <li>Exception handling, custom exceptions, <code>using</code>/<code>IDisposable</code>, <code>IAsyncDisposable</code></li>
      <li>Nullable reference types, pattern matching, records, tuples</li>
    </ul>
    <h3>Advanced</h3>
    <ul>
      <li>async/await state machine, <code>Task</code> vs <code>ValueTask</code>, <code>ConfigureAwait</code></li>
      <li>TPL, <code>Parallel</code>, PLINQ, <code>Channel&lt;T&gt;</code>, <code>IAsyncEnumerable</code></li>
      <li>Threading: locks, <code>Interlocked</code>, <code>SemaphoreSlim</code>, thread-safe collections</li>
      <li><code>Span&lt;T&gt;</code>, <code>Memory&lt;T&gt;</code>, <code>stackalloc</code>, <code>ArrayPool</code></li>
    </ul>
    <h3>Senior-level</h3>
    <ul>
      <li>GC internals: generations, LOH, server vs workstation GC, tuning</li>
      <li>Performance: allocations, benchmarking (BenchmarkDotNet), profiling</li>
      <li>Source generators, Roslyn analyzers, AOT/trimming</li>
      <li>Diagnosing deadlocks, ThreadPool starvation, memory leaks</li>
    </ul>
    <div class="callout tip"><span class="t">Resume tie-in</span>Your AI streaming feature used <code>Channels</code> and async streaming — expect deep async/await, backpressure and cancellation questions here.</div>
  `,
  groups:[
    { name:'Fundamentals', desc:'Basic questions every .NET interview opens with.',
      qs:[
        {lvl:'basic', q:'What is the difference between a value type and a reference type?',
         a:`<p><strong>Value types</strong> (struct, enum, int, bool, DateTime) hold their data directly and are typically allocated on the <strong>stack</strong> (or inline within their containing object). Assigning one copies the value.</p>
            <p><strong>Reference types</strong> (class, string, array, delegate) hold a <em>reference</em> to data on the <strong>managed heap</strong>. Assigning copies the reference, so both variables point at the same object.</p>
            <ul><li>Value types are compared by value by default; reference types by reference (unless overridden).</li>
            <li>Passing a value type copies it; passing a reference type copies the pointer.</li>
            <li>A struct inside a class field lives on the heap (as part of that object), so "value type = stack" is a simplification.</li></ul>`},
        {lvl:'basic', q:'What is boxing and unboxing, and why does it matter for performance?',
         a:`<p><strong>Boxing</strong> wraps a value type in an object on the heap so it can be treated as <code>object</code> (or an interface). <strong>Unboxing</strong> extracts it back.</p>
            <pre><code>int x = 5;
object o = x;      // boxing  -> heap allocation + copy
int y = (int)o;    // unboxing -> copy back, cast check</code></pre>
            <p><strong>Why it matters:</strong> each boxing is a heap allocation and adds GC pressure. Hot paths using non-generic collections (<code>ArrayList</code>), <code>string.Format</code> with value types, or LINQ over structs can box heavily. Prefer generics (<code>List&lt;int&gt;</code>) which avoid boxing entirely.</p>`},
        {lvl:'basic', q:'Why are strings immutable in C#, and what problems does that cause?',
         a:`<p>A <code>string</code> object cannot be changed after creation; any "modification" creates a new string. Benefits: thread safety, safe sharing, string interning, hashing stability (safe dictionary keys).</p>
            <p><strong>Problem:</strong> repeated concatenation in loops creates many intermediate strings → O(n²) allocations. Use <code>StringBuilder</code> for building strings, or <code>string.Join</code>/interpolation for known parts.</p>`},
        {lvl:'basic', q:'const vs readonly vs static readonly?',
         a:`<ul>
            <li><code>const</code>: compile-time constant, implicitly static, baked into callers' IL (changing it requires recompiling consumers). Only for literals.</li>
            <li><code>readonly</code>: set at declaration or in the constructor; per-instance; resolved at runtime.</li>
            <li><code>static readonly</code>: one shared value, set in static constructor; good for values that shouldn't be inlined into other assemblies.</li>
            </ul>
            <p><strong>Trap:</strong> exposing a public <code>const</code> across assembly boundaries — consumers cache the old value until recompiled. Use <code>static readonly</code> instead.</p>`},
        {lvl:'basic', q:'What is the difference between an abstract class and an interface?',
         a:`<table><tr><th>Aspect</th><th>Abstract class</th><th>Interface</th></tr>
            <tr><td>Instances</td><td>Cannot instantiate</td><td>Cannot instantiate</td></tr>
            <tr><td>Members</td><td>Fields, ctors, implemented + abstract members</td><td>Members; default implementations (C# 8+), no instance fields</td></tr>
            <tr><td>Inheritance</td><td>Single base class</td><td>Multiple interfaces</td></tr>
            <tr><td>Use when</td><td>Shared state/behavior, "is-a"</td><td>Capability/contract, "can-do"</td></tr></table>
            <p>Since C# 8, interfaces can have default methods, blurring the line — but interfaces still cannot hold instance state.</p>`},
        {lvl:'basic', q:'Explain the four main OOP pillars with a C# example.',
         a:`<ul>
            <li><strong>Encapsulation</strong>: hide state behind properties/methods (<code>private</code> fields + public API).</li>
            <li><strong>Abstraction</strong>: expose <em>what</em>, hide <em>how</em> (interfaces, abstract classes).</li>
            <li><strong>Inheritance</strong>: reuse via base classes (<code>class Manager : Employee</code>).</li>
            <li><strong>Polymorphism</strong>: same call, different behavior (<code>virtual</code>/<code>override</code>, interface dispatch).</li>
            </ul>
            <p>Senior nuance: prefer <strong>composition over inheritance</strong>; deep hierarchies are fragile.</p>`},
      ]},
    { name:'Generics, LINQ & Delegates', desc:'Language features that show up constantly.',
      qs:[
        {lvl:'intermediate', q:'IEnumerable vs IQueryable — when does the difference bite you?',
         a:`<p><code>IEnumerable&lt;T&gt;</code> executes in memory (LINQ to Objects): the whole sequence is pulled and filtering happens client-side. <code>IQueryable&lt;T&gt;</code> builds an <em>expression tree</em> that a provider (EF Core) translates to SQL, so filtering/paging happen at the database.</p>
            <pre><code>// BAD: pulls ALL users into memory, then filters
IEnumerable&lt;User&gt; q = db.Users;
var active = q.Where(u =&gt; u.IsActive).Take(10);

// GOOD: SQL WHERE + TOP 10
IQueryable&lt;User&gt; q2 = db.Users;
var active2 = q2.Where(u =&gt; u.IsActive).Take(10);</code></pre>
            <p><strong>Trap:</strong> calling <code>.AsEnumerable()</code>/<code>.ToList()</code> too early forces client-side evaluation and can load huge tables.</p>`},
        {lvl:'intermediate', q:'Deferred vs immediate execution in LINQ?',
         a:`<p>Most LINQ operators (<code>Where</code>, <code>Select</code>, <code>OrderBy</code>) are <strong>deferred</strong> — they build a query but don't run until enumerated (foreach, <code>ToList</code>, <code>Count</code>, <code>First</code>). This means the query re-runs each time you enumerate, and captures variables by reference.</p>
            <pre><code>var threshold = 10;
var q = numbers.Where(n =&gt; n &gt; threshold);
threshold = 100;          // affects q!
var r = q.ToList();       // filters by 100, not 10</code></pre>
            <p>Materialize with <code>ToList()</code>/<code>ToArray()</code> when you need a stable snapshot or will iterate multiple times.</p>`},
        {lvl:'intermediate', q:'What is a closure and what is the classic captured-variable bug?',
         a:`<p>A <strong>closure</strong> captures variables from its enclosing scope by <em>reference</em>. The classic bug (pre-C# 5 foreach, still relevant with plain <code>for</code>):</p>
            <pre><code>var actions = new List&lt;Action&gt;();
for (int i = 0; i &lt; 3; i++)
    actions.Add(() =&gt; Console.Write(i));
actions.ForEach(a =&gt; a());   // prints 3 3 3, not 0 1 2</code></pre>
            <p>All lambdas share the same <code>i</code>. Fix by copying into a loop-local: <code>int copy = i;</code> and capture <code>copy</code>.</p>`},
        {lvl:'intermediate', q:'Func vs Action vs Predicate, and delegates vs events?',
         a:`<ul><li><code>Action&lt;...&gt;</code>: returns void. <code>Func&lt;...,TResult&gt;</code>: returns a value. <code>Predicate&lt;T&gt;</code>: <code>Func&lt;T,bool&gt;</code>.</li>
            <li>A <strong>delegate</strong> is a type-safe function pointer. An <strong>event</strong> wraps a delegate so subscribers can only <code>+=</code>/<code>-=</code> — they can't invoke or overwrite it, enforcing the publisher/subscriber boundary.</li></ul>`},
        {lvl:'advanced', q:'Explain covariance and contravariance in generics.',
         a:`<p><strong>Covariance</strong> (<code>out</code>) lets you use a more-derived type: <code>IEnumerable&lt;string&gt;</code> is assignable to <code>IEnumerable&lt;object&gt;</code>. <strong>Contravariance</strong> (<code>in</code>) lets you use a less-derived type: <code>Action&lt;object&gt;</code> is assignable to <code>Action&lt;string&gt;</code>.</p>
            <p>Rule of thumb: <code>out</code> for output positions (return), <code>in</code> for input positions (parameters). Only interfaces and delegates support variance, and only for reference types.</p>`},
      ]},
    { name:'Async, Await & Concurrency', desc:'The single most probed .NET topic for senior roles.',
      qs:[
        {lvl:'intermediate', q:'What does async/await actually do under the hood?',
         a:`<p>The compiler rewrites an <code>async</code> method into a <strong>state machine</strong>. At each <code>await</code>, if the awaited task isn't complete, the method <em>returns</em> to the caller and registers a continuation. When the awaited operation completes, the continuation resumes (on a captured <code>SynchronizationContext</code> unless <code>ConfigureAwait(false)</code>).</p>
            <p>Key point: <code>async</code> does <strong>not</strong> create threads. It frees the current thread while I/O completes. For I/O-bound work this scales enormously; for CPU-bound work you still need <code>Task.Run</code>/parallelism.</p>`},
        {lvl:'advanced', q:'What causes an async deadlock and how do you avoid it?',
         a:`<p>Blocking on an async call (<code>.Result</code> or <code>.Wait()</code>) while a <code>SynchronizationContext</code> is captured (classic ASP.NET/WinForms/WPF) deadlocks: the awaited continuation needs the context thread, but that thread is blocked waiting for the result.</p>
            <pre><code>// deadlock in a context-bound app
var data = GetDataAsync().Result;</code></pre>
            <p><strong>Fixes:</strong> go async all the way (<code>await GetDataAsync()</code>); use <code>ConfigureAwait(false)</code> in library code so continuations don't need the original context; never sync-over-async. ASP.NET Core has no <code>SynchronizationContext</code>, reducing (not eliminating) this class of bug.</p>`},
        {lvl:'advanced', q:'Task vs ValueTask — when should you use ValueTask?',
         a:`<p><code>Task</code> is a class → allocates on the heap. <code>ValueTask&lt;T&gt;</code> is a struct that avoids allocation when the result is already available (e.g., cache hit).</p>
            <p>Use <code>ValueTask</code> for <strong>hot paths that frequently complete synchronously</strong> (buffered streams, caches). Caveats: you must <strong>not</strong> await a <code>ValueTask</code> more than once, store it, or block on it. When in doubt, return <code>Task</code>.</p>`},
        {lvl:'advanced', q:'What is ConfigureAwait(false) and when do you use it?',
         a:`<p>It tells the awaiter <em>not</em> to marshal the continuation back to the captured context. In <strong>library code</strong> this avoids unnecessary context switches and helps prevent deadlocks. In app-level code that needs the UI/request context after the await, don't use it. In ASP.NET Core there's no sync context, so it mostly affects performance, not correctness.</p>`},
        {lvl:'advanced', q:'How do you run tasks in parallel and control concurrency?',
         a:`<p>Fan-out with <code>Task.WhenAll</code>; limit concurrency with <code>SemaphoreSlim</code> or <code>Parallel.ForEachAsync</code> (with <code>MaxDegreeOfParallelism</code>).</p>
            <pre><code>var sem = new SemaphoreSlim(5);
var tasks = items.Select(async item =&gt; {
    await sem.WaitAsync();
    try { await ProcessAsync(item); }
    finally { sem.Release(); }
});
await Task.WhenAll(tasks);</code></pre>
            <p><strong>Trap:</strong> awaiting inside a <code>foreach</code> serializes work; and unbounded <code>WhenAll</code> over thousands of items can exhaust connections/thread pool.</p>`},
        {lvl:'senior', q:'What is ThreadPool starvation and how do you diagnose it?',
         a:`<p>Starvation happens when all pool threads are blocked (often by sync-over-async or long locks), so queued work — including request continuations — can't run. Symptoms: rising latency, timeouts, low CPU but high queue length.</p>
            <p><strong>Diagnose:</strong> <code>dotnet-counters</code> (ThreadPool queue length, thread count), dumps showing many threads blocked in <code>.Result</code>/<code>Wait</code>. <strong>Fix:</strong> remove blocking calls, make everything async, cap concurrency, and avoid <code>Task.Run</code> for I/O.</p>`},
        {lvl:'advanced', q:'How does CancellationToken work and why is it important?',
         a:`<p>A <code>CancellationTokenSource</code> produces a <code>CancellationToken</code> passed through async call chains. Cooperative cancellation: callees check <code>token.IsCancellationRequested</code> or pass the token to async APIs which throw <code>OperationCanceledException</code>.</p>
            <p>Essential for request timeouts, client disconnects (ASP.NET Core provides <code>HttpContext.RequestAborted</code>), and stopping expensive work like LLM calls when a user cancels. Always thread the token to downstream I/O and DB calls.</p>`},
      ]},
    { name:'Memory, GC & Performance', desc:'Senior-level depth interviewers use to separate candidates.',
      qs:[
        {lvl:'advanced', q:'Explain the generational garbage collector.',
         a:`<p>The .NET GC is generational and self-tuning:</p>
            <ul><li><strong>Gen 0</strong>: short-lived objects; collected most often, very fast.</li>
            <li><strong>Gen 1</strong>: buffer between short and long lived.</li>
            <li><strong>Gen 2</strong>: long-lived objects; expensive full collections.</li>
            <li><strong>LOH (Large Object Heap)</strong>: objects ≥85KB; collected with Gen 2, historically not compacted (can fragment).</li></ul>
            <p>Most objects die young (generational hypothesis), so Gen 0 sweeps are cheap. Survivors get promoted. Minimize promotions and LOH churn to reduce pauses.</p>`},
        {lvl:'senior', q:'Server GC vs Workstation GC?',
         a:`<p><strong>Workstation GC</strong>: optimized for low latency on client apps; fewer heaps. <strong>Server GC</strong>: one heap + dedicated GC thread per core, higher throughput — the default for ASP.NET Core server workloads. Combined with <strong>concurrent/background GC</strong> to reduce pause times. Configure via <code>&lt;ServerGarbageCollection&gt;</code> in the csproj or <code>DOTNET_gcServer</code>.</p>`},
        {lvl:'advanced', q:'What are Span<T> and Memory<T> and when do you use them?',
         a:`<p><code>Span&lt;T&gt;</code> is a stack-only view over contiguous memory (arrays, <code>stackalloc</code>, strings) enabling slicing <strong>without allocation or copying</strong>. Because it's a <code>ref struct</code> it can't be stored on the heap or used across <code>await</code>. <code>Memory&lt;T&gt;</code> is the heap-friendly counterpart usable in async code.</p>
            <p>Use them in parsing/serialization hot paths to slice buffers and avoid substring/array allocations — a real win in high-throughput APIs.</p>`},
        {lvl:'senior', q:'How would you find and fix a memory leak in a .NET service?',
         a:`<p>Managed leaks are usually <em>unintentional references</em> keeping objects alive:</p>
            <ol><li>Confirm with metrics: growing Gen 2 / working set that never drops.</li>
            <li>Capture two heap snapshots (<code>dotnet-gcdump</code> / Visual Studio / dotMemory) and diff to find the growing type.</li>
            <li>Inspect roots: common culprits are static collections/caches without eviction, un-unsubscribed events, undisposed <code>HttpClient</code>/timers, and captured closures.</li>
            <li>Fix: bound caches (size/TTL), unsubscribe events, dispose resources, use <code>IHttpClientFactory</code>.</li></ol>`},
        {lvl:'senior', q:'How do you approach performance optimization in a .NET API?',
         a:`<p>Measure first — never guess. Steps: reproduce under load (k6/BenchmarkDotNet for micro), profile CPU + allocations, identify the dominant cost. Common wins: eliminate N+1 DB queries, add caching (Redis/output cache), reduce allocations (pooling, <code>Span</code>), async I/O, response compression, and paginate. Then re-measure and set SLOs (p95/p99 latency, allocations/req).</p>`},
      ]},
    { name:'Language features & modern C#', desc:'Records, pattern matching, nullability.',
      qs:[
        {lvl:'intermediate', q:'What are records and when do you use them?',
         a:`<p><code>record</code> types provide value-based equality, concise syntax, <code>with</code>-expressions for non-destructive copies, and built-in <code>ToString</code>. Ideal for <strong>immutable DTOs</strong>, value objects, and messages (e.g., MediatR commands/queries). <code>record struct</code> gives value-type semantics. Use classes when you need mutable identity-based objects (entities).</p>`},
        {lvl:'intermediate', q:'How do nullable reference types help, and what are their limits?',
         a:`<p>With NRTs enabled, the compiler tracks nullability (<code>string</code> vs <code>string?</code>) and warns on possible null dereferences, catching many <code>NullReferenceException</code>s at compile time. Limits: it's <em>compile-time only</em> (no runtime enforcement), can be bypassed with the <code>!</code> null-forgiving operator, and data crossing boundaries (deserialization, DB) may still be null. Combine with guard clauses / <code>ArgumentNullException.ThrowIfNull</code>.</p>`},
        {lvl:'advanced', q:'Give a practical use of pattern matching / switch expressions.',
         a:`<pre><code>decimal Fee(Payment p) =&gt; p switch {
    { Type: "Card", Amount: &gt; 1000 } =&gt; p.Amount * 0.02m,
    { Type: "Card" }                 =&gt; p.Amount * 0.03m,
    { Type: "Wire" }                 =&gt; 15m,
    null                              =&gt; throw new ArgumentNullException(),
    _                                 =&gt; 0m
};</code></pre>
            <p>Property, relational, and <code>and/or</code> patterns make branching declarative and exhaustive — great for rule engines (relevant to your hybrid rule-processing work).</p>`},
        {lvl:'intermediate', q:'IDisposable vs IAsyncDisposable and the using pattern?',
         a:`<p>Implement <code>IDisposable</code> to release unmanaged resources / other disposables deterministically; <code>using</code>/<code>using var</code> guarantees <code>Dispose</code> even on exceptions. For resources with async cleanup (streams, DB connections in async flows) implement <code>IAsyncDisposable</code> and use <code>await using</code>. Follow the full dispose pattern (with a finalizer) only when you directly hold unmanaged handles.</p>`},
      ]},
    { name:'Scenario & production', desc:'Applied questions tied to real backends.',
      qs:[
        {lvl:'scenario', q:'A .NET API intermittently times out under load though CPU is low. How do you investigate?',
         a:`<p>Low CPU + timeouts strongly suggests <strong>thread pool starvation</strong> or <strong>connection exhaustion</strong>, not compute. Steps:</p>
            <ol><li>Check ThreadPool queue length and thread count (<code>dotnet-counters</code>). Rising queue = starvation.</li>
            <li>Grep for sync-over-async (<code>.Result</code>, <code>.Wait()</code>, <code>Task.Run</code> around I/O). Remove them.</li>
            <li>Check DB/HTTP connection pool limits and slow dependencies; a slow downstream backs up all threads.</li>
            <li>Verify <code>HttpClient</code> reuse via <code>IHttpClientFactory</code> (socket exhaustion otherwise).</li>
            <li>Add timeouts + <code>CancellationToken</code> propagation and circuit breakers (Polly).</li></ol>`},
        {lvl:'production', q:'How do you make outbound calls resilient in .NET (relevant to Azure AI connectivity)?',
         a:`<p>Wrap calls with <strong>Polly</strong>: retry with exponential backoff + jitter for transient failures, a <strong>circuit breaker</strong> to stop hammering a failing dependency, timeouts, and a fallback. In .NET 8+ use <code>Microsoft.Extensions.Http.Resilience</code> / <code>ResiliencePipeline</code>.</p>
            <pre><code>services.AddHttpClient&lt;AiClient&gt;()
    .AddStandardResilienceHandler(); // retry+breaker+timeout</code></pre>
            <p>For LLM calls specifically: bound retries (they're expensive), respect rate-limit <code>Retry-After</code> headers, and cancel on client disconnect.</p>`},
        {lvl:'scenario', q:'You must process 100k records without exhausting memory or the DB. Approach?',
         a:`<p>Stream, don't load everything. Use <code>IAsyncEnumerable</code> + EF Core <code>AsAsyncEnumerable()</code> or keyset pagination to page through data; batch writes; cap parallelism with <code>SemaphoreSlim</code>/<code>Parallel.ForEachAsync</code>; use <code>ArrayPool</code>/<code>Span</code> for buffers; and checkpoint progress so a failure resumes rather than restarts.</p>`},
        {lvl:'senior', q:'How do you implement a producer/consumer pipeline in .NET? (ties to your SSE streaming)',
         a:`<p>Use <code>System.Threading.Channels</code>. A bounded channel gives backpressure: producers await when the buffer is full, preventing runaway memory.</p>
            <pre><code>var channel = Channel.CreateBounded&lt;Token&gt;(new BoundedChannelOptions(100){
    FullMode = BoundedChannelFullMode.Wait });

// producer (LLM stream)
await foreach (var t in llm.StreamAsync(ct))
    await channel.Writer.WriteAsync(t, ct);
channel.Writer.Complete();

// consumer (write to SSE ReadableStream)
await foreach (var t in channel.Reader.ReadAllAsync(ct))
    await response.WriteAsync($"data: {t}\\n\\n", ct);</code></pre>
            <p>This is exactly the shape used to stream first-token-in-&lt;400ms responses to the browser.</p>`},
      ]},
  ]
});
</script>
<script>
/* ===================== ASP.NET CORE & WEB APIs ===================== */
S({
  id:'aspnet', cat:'Backend Masterclass', icon:'🌐', title:'ASP.NET Core & Web APIs', tag:'Core',
  lede:'The web framework behind your REST APIs and multi-tenant SaaS: pipeline, DI, routing, auth, resilience, and production concerns.',
  intro:`
    <h2>Topics to cover before the interview</h2>
    <ul>
      <li><strong>Beginner:</strong> request pipeline, middleware, controllers vs minimal APIs, routing, model binding, DI lifetimes.</li>
      <li><strong>Intermediate:</strong> filters, model validation, API versioning, content negotiation, configuration & Options, logging.</li>
      <li><strong>Advanced:</strong> authentication (JWT/OIDC), authorization (policy/role/claims), CORS, rate limiting, caching, health checks.</li>
      <li><strong>Senior:</strong> resilience (Polly), background services, hosted services, graceful shutdown, OpenTelemetry, multi-tenancy, minimal allocation.</li>
    </ul>
    <div class="callout"><span class="t">Pipeline mental model</span>Middleware forms an onion: each component can act on the request going in and the response coming out, and decides whether to call <code>next()</code>. Order is everything.</div>
    <pre><code>var app = builder.Build();
app.UseExceptionHandler("/error"); // outermost
app.UseHttpsRedirection();
app.UseRouting();
app.UseRateLimiter();
app.UseAuthentication();  // must be before Authorization
app.UseAuthorization();
app.UseOutputCache();
app.MapControllers();     // endpoint (innermost)
app.Run();</code></pre>
  `,
  groups:[
    { name:'Pipeline & DI', qs:[
      {lvl:'basic', q:'Describe the ASP.NET Core middleware pipeline.',
       a:`<p>Each request flows through an ordered chain of middleware. A component receives the <code>HttpContext</code>, optionally does work, then calls <code>next()</code> to pass control down; on the way back it can modify the response. Components can <strong>short-circuit</strong> (e.g., auth returning 401) by not calling next. Register with <code>app.Use...</code>. Order matters: e.g., <code>UseAuthentication</code> must precede <code>UseAuthorization</code>, and exception handling should be outermost.</p>`},
      {lvl:'basic', q:'Explain the three DI service lifetimes.',
       a:`<ul><li><strong>Transient</strong>: new instance every resolve. Use for lightweight, stateless services.</li>
          <li><strong>Scoped</strong>: one instance per request (per DI scope). Use for per-request state like <code>DbContext</code>.</li>
          <li><strong>Singleton</strong>: one instance for the app lifetime. Must be thread-safe.</li></ul>
          <p><strong>Captive dependency trap:</strong> injecting a <em>Scoped</em> (or Transient) service into a <em>Singleton</em> captures it for the app's life — a <code>DbContext</code> in a singleton is a classic bug. ASP.NET Core's scope validation catches many of these in Development.</p>`},
      {lvl:'intermediate', q:'Controllers vs Minimal APIs — how do you choose?',
       a:`<p><strong>Minimal APIs</strong> reduce ceremony and allocations, great for microservices and simple endpoints. <strong>Controllers</strong> offer built-in model binding/validation, filters, conventions, and better organization for large surface areas. For a big multi-tenant SaaS with cross-cutting filters and versioning, controllers often scale better organizationally; minimal APIs shine for focused, high-throughput endpoints.</p>`},
      {lvl:'intermediate', q:'What are filters and what order do they run in?',
       a:`<p>Filters run within the MVC action pipeline: <strong>Authorization → Resource → Model binding → Action → Result</strong>, with Exception filters wrapping. Use them for cross-cutting concerns: validation, logging, caching, transactions, tenant resolution. Prefer filters over stuffing logic into every action. For pipeline-wide concerns (before MVC), use middleware instead.</p>`},
      {lvl:'advanced', q:'How does the Options pattern work and why prefer IOptionsSnapshot/IOptionsMonitor?',
       a:`<p>Bind configuration sections to strongly-typed classes via <code>services.Configure&lt;MyOptions&gt;(config.GetSection(...))</code>. Inject <code>IOptions&lt;T&gt;</code> (singleton snapshot), <code>IOptionsSnapshot&lt;T&gt;</code> (per-request, picks up reloaded config, scoped), or <code>IOptionsMonitor&lt;T&gt;</code> (singleton with change notifications). Use Snapshot/Monitor when config can change at runtime (feature flags, per-tenant options).</p>`},
    ]},
    { name:'APIs, validation & versioning', qs:[
      {lvl:'basic', q:'What makes an API RESTful? Key HTTP status codes?',
       a:`<p>REST: resources identified by URIs, standard verbs (GET/POST/PUT/PATCH/DELETE), statelessness, and correct status semantics. Codes: 200 OK, 201 Created (+Location), 204 No Content, 400 Bad Request, 401 Unauthorized, 403 Forbidden, 404 Not Found, 409 Conflict, 422 Unprocessable Entity, 429 Too Many Requests, 500/503. Use <code>ProblemDetails</code> (RFC 7807) for consistent error bodies.</p>`},
      {lvl:'intermediate', q:'How do you validate input and return consistent errors?',
       a:`<p>Use data annotations or FluentValidation; with <code>[ApiController]</code>, invalid models auto-return 400 with a validation <code>ProblemDetails</code>. Centralize unhandled errors with <code>UseExceptionHandler</code>/<code>IExceptionHandler</code> returning ProblemDetails, and never leak stack traces in production. Validate at the boundary; keep domain invariants in the domain.</p>`},
      {lvl:'intermediate', q:'How do you version a Web API and why?',
       a:`<p>Versioning avoids breaking existing clients. Strategies: URL segment (<code>/v1/</code>), query string, or header (<code>Api-Version</code>). Use <code>Asp.Versioning</code>. URL versioning is most explicit/cacheable. Pair with a deprecation policy and API docs (Swagger/OpenAPI) per version.</p>`},
      {lvl:'advanced', q:'How do you implement idempotency for POST endpoints?',
       a:`<p>Clients send an <code>Idempotency-Key</code> header; the server stores the key + response (in Redis) for a TTL. Repeat requests with the same key return the stored result instead of re-executing. Critical for payment/invoice creation to avoid duplicates on retries. Combine with unique DB constraints as a backstop.</p>`},
    ]},
    { name:'Security & auth', qs:[
      {lvl:'intermediate', q:'Authentication vs Authorization in ASP.NET Core?',
       a:`<p><strong>Authentication</strong> = who you are (validating a JWT/cookie, populating <code>ClaimsPrincipal</code>). <strong>Authorization</strong> = what you may do (policies, roles, claims). Configure with <code>AddAuthentication().AddJwtBearer(...)</code> and <code>AddAuthorization(o =&gt; o.AddPolicy(...))</code>. Apply with <code>[Authorize(Policy="...")]</code>.</p>`},
      {lvl:'advanced', q:'Explain JWT validation and common pitfalls.',
       a:`<p>A JWT has header.payload.signature. The API validates: signature (against the issuer's keys/JWKS), <code>iss</code>, <code>aud</code>, <code>exp</code>/<code>nbf</code>, and algorithm. Pitfalls: accepting <code>alg: none</code>, not validating audience/issuer, long-lived tokens without rotation, storing tokens in <code>localStorage</code> (XSS risk — prefer httpOnly cookies for browser apps), and no clock-skew handling.</p>`},
      {lvl:'advanced', q:'How do you enforce tenant isolation in a multi-tenant API? (resume tie-in)',
       a:`<p>Resolve tenant early (subdomain/header/claim) into an <code>ITenantContext</code> (scoped). Enforce isolation in <strong>defense in depth</strong>: (1) EF Core global query filter <code>HasQueryFilter(e =&gt; e.TenantId == _tenant.Id)</code>, (2) authorization checks, (3) separate storage prefixes/containers, and (4) never trust a tenant id from the client body — derive it from the authenticated principal. Consider row-level security in SQL as a backstop.</p>`},
      {lvl:'intermediate', q:'How do you protect against common web vulnerabilities?',
       a:`<ul><li><strong>SQL injection:</strong> parameterized queries / EF Core (never string-concat SQL).</li>
          <li><strong>XSS:</strong> output-encode, CSP headers, avoid <code>dangerouslySetInnerHTML</code>/<code>v-html</code> with untrusted data.</li>
          <li><strong>CSRF:</strong> antiforgery tokens for cookie-auth; SameSite cookies.</li>
          <li><strong>Secrets:</strong> Key Vault / user-secrets, never in source.</li>
          <li>Rate limiting, HTTPS/HSTS, and least-privilege everywhere.</li></ul>`},
    ]},
    { name:'Performance, resilience & production', qs:[
      {lvl:'advanced', q:'What caching options does ASP.NET Core offer?',
       a:`<p><strong>Response/Output caching</strong> (server-side cached responses, .NET 7+ output cache with tag invalidation), <strong>IMemoryCache</strong> (in-process, per-instance), and <strong>IDistributedCache</strong> (Redis, shared across instances). Use distributed cache for multi-instance SaaS. Always define an invalidation strategy and TTLs; cache stampede protection via locks or <code>GetOrCreate</code> with single-flight.</p>`},
      {lvl:'senior', q:'How do you add resilience to dependencies?',
       a:`<p>Polly / <code>Microsoft.Extensions.Http.Resilience</code>: retries with exponential backoff + jitter, circuit breaker, timeout, bulkhead isolation, and fallback. Register per <code>HttpClient</code> via <code>IHttpClientFactory</code> to also avoid socket exhaustion. Tune retries so you don't amplify load during outages (retry storms).</p>`},
      {lvl:'intermediate', q:'How do you run background work in ASP.NET Core?',
       a:`<p>Implement <code>BackgroundService</code>/<code>IHostedService</code> for long-running loops (queue consumers, schedulers). For per-request fire-and-forget, prefer a durable queue (channel + hosted consumer, or a real broker) rather than untracked <code>Task.Run</code>, which can be lost on shutdown. Honor the stopping token for graceful shutdown.</p>`},
      {lvl:'production', q:'How do you make the app observable in production?',
       a:`<p>Structured logging (Serilog/ILogger with correlation ids), metrics (<code>System.Diagnostics.Metrics</code> / OpenTelemetry), and distributed tracing (Activity/OTel exporters to App Insights/Jaeger). Add health checks (<code>/health/live</code>, <code>/health/ready</code>) for orchestrators. Track p95/p99 latency, error rate, saturation, and dependency latency.</p>`},
      {lvl:'scenario', q:'After deploy, one API instance returns 503s while others are fine. How do you triage?',
       a:`<p>Check that instance's health endpoint, logs, and resource metrics. Likely causes: failed warmup/DB connection, thread pool starvation on that node, a poison message stuck in its queue, or clock/config drift. Immediate mitigation: drain/recycle the instance (readiness probe fails → load balancer stops routing). Then root-cause via that node's traces before it was pulled.</p>`},
    ]},
  ]
});

/* ===================== ENTITY FRAMEWORK CORE ===================== */
S({
  id:'efcore', cat:'Backend Masterclass', icon:'🧬', title:'Entity Framework Core', tag:'Data access',
  lede:'Your primary ORM across both projects — change tracking, LINQ→SQL, performance (N+1), transactions, concurrency, and multi-tenant filters.',
  intro:`
    <h2>What to master</h2>
    <ul>
      <li><strong>Core:</strong> DbContext, DbSet, change tracking, migrations, relationships, loading strategies.</li>
      <li><strong>Intermediate:</strong> tracking vs no-tracking, eager/lazy/explicit loading, projections, raw SQL.</li>
      <li><strong>Advanced:</strong> N+1 diagnosis, split queries, compiled queries, concurrency tokens, transactions & <code>SaveChanges</code> pipeline.</li>
      <li><strong>Senior:</strong> query plan/perf, batching, connection resiliency, global query filters (multi-tenancy), bulk operations.</li>
    </ul>
    <div class="callout warn"><span class="t">Interviewer favorite</span>Be ready to spot and fix an N+1 query and to explain the difference between <code>IQueryable</code> filtering (SQL) and in-memory filtering.</div>
  `,
  groups:[
    { name:'Core concepts', qs:[
      {lvl:'basic', q:'What is the DbContext and change tracker?',
       a:`<p><code>DbContext</code> is a unit of work + repository over the database. It tracks entities you load or add and records their state (Added/Modified/Deleted/Unchanged). <code>SaveChanges</code> inspects the change tracker and generates the necessary INSERT/UPDATE/DELETE statements inside a transaction. DbContext is <strong>not thread-safe</strong> and should be scoped per request.</p>`},
      {lvl:'basic', q:'Eager vs lazy vs explicit loading?',
       a:`<ul><li><strong>Eager</strong>: <code>Include()</code> loads related data in the initial query (or split queries).</li>
          <li><strong>Lazy</strong>: navigation properties load on first access (requires proxies) — convenient but a common source of N+1 and surprise queries.</li>
          <li><strong>Explicit</strong>: <code>context.Entry(x).Collection(...).Load()</code> on demand.</li></ul>
          <p>For web apps, prefer eager loading with projections; avoid lazy loading in hot paths.</p>`},
      {lvl:'intermediate', q:'When and why use AsNoTracking()?',
       a:`<p>For read-only queries, <code>AsNoTracking()</code> skips creating change-tracking entries — less memory, faster, and no accidental updates. Use it for list/reporting endpoints. Keep tracking for entities you intend to modify. <code>AsNoTrackingWithIdentityResolution()</code> when you still need reference de-duplication.</p>`},
      {lvl:'intermediate', q:'Projections vs loading full entities?',
       a:`<p>Projecting to a DTO with <code>Select</code> fetches only needed columns and avoids tracking, reducing IO and memory:</p>
          <pre><code>var rows = await db.Invoices
   .Where(i =&gt; i.TenantId == tid)
   .Select(i =&gt; new InvoiceDto(i.Id, i.Number, i.Total))
   .ToListAsync();</code></pre>
          <p>Prefer projections for read APIs; load full entities only when you must mutate them.</p>`},
    ]},
    { name:'Performance & pitfalls', qs:[
      {lvl:'advanced', q:'What is the N+1 problem and how do you fix it in EF Core?',
       a:`<p>N+1: one query loads N parents, then accessing a navigation triggers one query per parent (N more). Total N+1 round-trips → latency explosion.</p>
          <pre><code>// N+1 (lazy loading)
foreach (var o in db.Orders.ToList())
    Console.WriteLine(o.Customer.Name); // query per order

// Fix: eager load
var orders = db.Orders.Include(o =&gt; o.Customer).ToList();</code></pre>
          <p>Diagnose by logging SQL or using MiniProfiler. For one-to-many with big fan-out, use <code>AsSplitQuery()</code> to avoid a cartesian explosion.</p>`},
      {lvl:'advanced', q:'Single query vs split query — the cartesian explosion?',
       a:`<p>Eager-loading multiple collections in one SQL join multiplies rows (parent × childrenA × childrenB), duplicating parent data and bloating the result. <code>AsSplitQuery()</code> issues separate queries per collection, trading extra round-trips for far less data transfer. Use split queries when including multiple/large collections; single query when includes are small or you need transactional consistency of one snapshot.</p>`},
      {lvl:'advanced', q:'What are compiled queries and when do they help?',
       a:`<p><code>EF.CompileAsyncQuery</code> caches the query plan/translation so EF skips re-building the expression tree each call — useful for very hot, frequently executed queries. Gains are modest; measure first. EF Core also has an internal query cache, so this mainly helps extreme throughput paths.</p>`},
      {lvl:'senior', q:'How do you do efficient bulk inserts/updates?',
       a:`<p>Plain <code>SaveChanges</code> sends per-row statements (batched, but still row-oriented). For large volumes use EF Core 7+ <code>ExecuteUpdate</code>/<code>ExecuteDelete</code> (set-based, no tracking), or a bulk library / <code>SqlBulkCopy</code> / <code>COPY</code> (PostgreSQL). Turn off tracking, batch in chunks, and wrap in a transaction. Avoid loading entities just to update a flag.</p>`},
    ]},
    { name:'Transactions, concurrency & multi-tenancy', qs:[
      {lvl:'advanced', q:'How does optimistic concurrency work in EF Core?',
       a:`<p>Add a concurrency token — a <code>rowversion</code>/<code>[Timestamp]</code> column (SQL Server) or <code>xmin</code> (PostgreSQL). On <code>SaveChanges</code>, EF adds the original token value to the WHERE clause. If another transaction changed the row, 0 rows update and EF throws <code>DbUpdateConcurrencyException</code>, which you handle (reload, merge, or ask the user). Prevents lost updates without long-held locks.</p>`},
      {lvl:'advanced', q:'How do you manage explicit transactions across multiple SaveChanges?',
       a:`<pre><code>await using var tx = await db.Database.BeginTransactionAsync();
try {
   // multiple operations / SaveChanges
   await db.SaveChangesAsync();
   await tx.CommitAsync();
} catch { await tx.RollbackAsync(); throw; }</code></pre>
          <p>For resiliency with retrying execution strategy, wrap in <code>db.Database.CreateExecutionStrategy().ExecuteAsync(...)</code> so retries re-run the whole transaction atomically.</p>`},
      {lvl:'senior', q:'How do global query filters enforce multi-tenancy, and what are the gotchas?',
       a:`<p><code>modelBuilder.Entity&lt;Invoice&gt;().HasQueryFilter(i =&gt; i.TenantId == _tenantProvider.TenantId)</code> auto-appends the tenant predicate to every query. Gotchas: filters are ignored on <code>Find</code> by key and can be bypassed with <code>IgnoreQueryFilters()</code>; the tenant id must come from a scoped provider captured correctly; and you must still set <code>TenantId</code> on insert (via <code>SaveChanges</code> interceptor). Treat it as one layer of defense, not the only one.</p>`},
      {lvl:'production', q:'How do you make EF Core resilient to transient Azure SQL failures?',
       a:`<p>Enable retry-on-failure: <code>options.UseSqlServer(cs, o =&gt; o.EnableRetryOnFailure())</code>. This wraps queries in an execution strategy that retries transient errors with backoff. Important with cloud DBs that throttle/failover. Ensure transactions use the execution strategy pattern so retries are safe, and keep operations idempotent.</p>`},
    ]},
    { name:'Scenario', qs:[
      {lvl:'scenario', q:'A list endpoint got slow after data grew. Walk through your EF Core investigation.',
       a:`<ol><li>Capture the generated SQL (EF logging / <code>ToQueryString()</code>).</li>
          <li>Check for N+1, missing <code>AsNoTracking</code>, over-fetching (loading full entities instead of projecting), and client-side evaluation.</li>
          <li>Run the SQL with an execution plan; add/adjust indexes for the WHERE/ORDER BY, ensure predicates are SARGable.</li>
          <li>Add keyset pagination instead of large OFFSET; cache hot reference data in Redis.</li>
          <li>Re-measure p95 and confirm the plan uses the index.</li></ol>`},
    ]},
  ]
});
</script>
<script>
/* ===================== DATABASE MASTERCLASS ===================== */
S({
  id:'database', cat:'Data Masterclass', icon:'🗄️', title:'Databases — SQL Server, PostgreSQL & Redis', tag:'Data',
  lede:'Relational design, indexing, execution plans, transactions/locks, stored procedures & triggers (used in your invoice platform), plus Redis caching patterns.',
  intro:`
    <h2>What to master</h2>
    <ul>
      <li><strong>Beginner:</strong> normalization (1NF–3NF), keys, joins, GROUP BY/HAVING, ACID, basic indexes.</li>
      <li><strong>Intermediate:</strong> clustered vs nonclustered indexes, covering indexes, transactions & isolation levels, stored procedures, views.</li>
      <li><strong>Advanced:</strong> execution plans, deadlocks, triggers, window functions, CTEs, partitioning, denormalization.</li>
      <li><strong>Senior:</strong> query tuning methodology, sharding/replication, Redis patterns, caching invalidation, SQL Server vs PostgreSQL differences.</li>
    </ul>
    <div class="callout tip"><span class="t">Resume tie-in</span>You used stored procedures, triggers, and functions to enforce integrity and performance across complex invoice schemas — expect deep questions on when procedural DB code is (and isn't) appropriate.</div>
    <h2>SARGability — the #1 tuning concept</h2>
    <p>A predicate is <strong>SARGable</strong> (Search ARGument-able) if the engine can use an index seek. Wrapping the column in a function kills it:</p>
    <pre><code>-- NOT SARGable: function on column -&gt; index scan
WHERE YEAR(CreatedAt) = 2025
-- SARGable: range on raw column -&gt; index seek
WHERE CreatedAt &gt;= '2025-01-01' AND CreatedAt &lt; '2026-01-01'</code></pre>
  `,
  groups:[
    { name:'Design & fundamentals', qs:[
      {lvl:'basic', q:'Explain normalization up to 3NF and when you denormalize.',
       a:`<ul><li><strong>1NF:</strong> atomic columns, no repeating groups.</li>
          <li><strong>2NF:</strong> 1NF + no partial dependency on part of a composite key.</li>
          <li><strong>3NF:</strong> 2NF + no transitive dependency (non-key depends only on the key).</li></ul>
          <p>Normalize to reduce redundancy and update anomalies. <strong>Denormalize</strong> deliberately for read-heavy paths (reporting, dashboards) — duplicating data to avoid expensive joins — accepting the cost of keeping copies in sync (triggers, app logic, or materialized views).</p>`},
      {lvl:'basic', q:'What does ACID mean?',
       a:`<ul><li><strong>Atomicity:</strong> all-or-nothing transaction.</li>
          <li><strong>Consistency:</strong> transactions move the DB between valid states (constraints hold).</li>
          <li><strong>Isolation:</strong> concurrent transactions don't corrupt each other (controlled by isolation level).</li>
          <li><strong>Durability:</strong> committed data survives crashes (write-ahead log).</li></ul>`},
      {lvl:'intermediate', q:'Types of joins and a common mistake?',
       a:`<p>INNER (matches only), LEFT/RIGHT OUTER (keep unmatched from one side as NULLs), FULL OUTER (both), CROSS (cartesian). Common mistake: filtering an OUTER join's right table in the <code>WHERE</code> clause turns it into an inner join — put those conditions in the <code>ON</code> clause instead. Another: forgetting a join predicate → accidental cartesian product.</p>`},
      {lvl:'intermediate', q:'Primary key vs unique vs clustered index?',
       a:`<p>A <strong>primary key</strong> uniquely identifies rows and is NOT NULL; in SQL Server it defaults to the clustered index. A <strong>unique constraint</strong> enforces uniqueness (allows one NULL in SQL Server). A <strong>clustered index</strong> defines the physical row order (one per table); the PK need not be the clustered key — for high-insert tables a narrow ever-increasing surrogate key as the clustered index avoids page splits.</p>`},
    ]},
    { name:'Indexing & execution plans', qs:[
      {lvl:'intermediate', q:'Clustered vs nonclustered index — what is a covering index?',
       a:`<p><strong>Clustered</strong>: the table data is stored in the index's order (leaf = the row). One per table. <strong>Nonclustered</strong>: a separate structure with key columns + a pointer (row locator) back to the row; a lookup is needed for other columns. A <strong>covering index</strong> uses <code>INCLUDE</code> to store the extra columns a query needs at the leaf level, so no key/RID lookup is required — the query is served entirely from the index.</p>
          <pre><code>CREATE INDEX IX_Inv_Tenant_Status
ON Invoices(TenantId, Status)
INCLUDE (Total, CreatedAt);</code></pre>`},
      {lvl:'advanced', q:'How do you read an execution plan to find a problem?',
       a:`<p>Look for: <strong>scans vs seeks</strong> (a scan on a large table with a selective predicate = missing/unusable index), <strong>key lookups</strong> (fix with a covering index), <strong>thick arrows</strong> (many rows / bad estimates), <strong>spills to tempdb</strong> (memory grant too small — often stale stats), and expensive <strong>sorts/hash joins</strong>. Compare <em>estimated vs actual</em> rows: big gaps mean out-of-date statistics or non-SARGable predicates. Then add/adjust indexes, update stats, or rewrite the query.</p>`},
      {lvl:'advanced', q:'What is a bookmark/key lookup and how do you eliminate it?',
       a:`<p>When a nonclustered index is used to find rows but the query needs columns not in that index, the engine performs one lookup into the clustered index per row. At scale this is costly. Eliminate by making the index <strong>covering</strong> (add needed columns via <code>INCLUDE</code>) or by selecting fewer columns.</p>`},
      {lvl:'senior', q:'What are the downsides of adding many indexes?',
       a:`<p>Every index must be maintained on INSERT/UPDATE/DELETE, slowing writes and consuming storage and buffer pool memory. Redundant/overlapping indexes waste resources and can confuse the optimizer. Balance read gains vs write cost; consolidate overlapping indexes, drop unused ones (check <code>sys.dm_db_index_usage_stats</code>), and index for your actual query patterns, not speculatively.</p>`},
      {lvl:'advanced', q:'Explain window functions with a practical example.',
       a:`<p>Window functions compute across a set of rows related to the current row without collapsing them (unlike GROUP BY).</p>
          <pre><code>SELECT InvoiceId, Total,
   ROW_NUMBER() OVER (PARTITION BY TenantId ORDER BY CreatedAt DESC) rn,
   SUM(Total)   OVER (PARTITION BY TenantId) tenant_total
FROM Invoices;</code></pre>
          <p>Great for top-N-per-group, running totals, ranking, and deduplication (keep <code>rn = 1</code>).</p>`},
    ]},
    { name:'Transactions, locks & concurrency', qs:[
      {lvl:'advanced', q:'Explain the isolation levels and the anomalies they prevent.',
       a:`<table><tr><th>Level</th><th>Prevents</th><th>Still allows</th></tr>
          <tr><td>Read Uncommitted</td><td>—</td><td>dirty reads</td></tr>
          <tr><td>Read Committed (default)</td><td>dirty reads</td><td>non-repeatable, phantom</td></tr>
          <tr><td>Repeatable Read</td><td>+ non-repeatable reads</td><td>phantoms</td></tr>
          <tr><td>Serializable</td><td>+ phantoms</td><td>— (lowest concurrency)</td></tr></table>
          <p>SQL Server also offers <strong>Snapshot/RCSI</strong> (row-versioning, readers don't block writers) — PostgreSQL uses MVCC by default. Higher isolation = more locking/versioning = lower concurrency.</p>`},
      {lvl:'advanced', q:'What is a deadlock and how do you prevent it?',
       a:`<p>A deadlock: two transactions each hold a lock the other needs, forming a cycle; the engine kills one as the "victim." Prevent by: accessing objects in a <strong>consistent order</strong>, keeping transactions <strong>short</strong>, using appropriate indexes (reduce lock footprint), lowering isolation where safe (RCSI), and retrying the victim with backoff. Diagnose with the deadlock graph (Extended Events / trace flag 1222).</p>`},
      {lvl:'intermediate', q:'Optimistic vs pessimistic concurrency?',
       a:`<p><strong>Pessimistic</strong>: lock rows so others wait (<code>UPDLOCK</code>/<code>SELECT ... FOR UPDATE</code>) — good for high-contention, short critical sections. <strong>Optimistic</strong>: don't lock; detect conflicts at write time via a version/rowversion and retry — better throughput when conflicts are rare (typical web apps). EF Core uses optimistic concurrency tokens.</p>`},
    ]},
    { name:'Procedural DB code & PostgreSQL', qs:[
      {lvl:'intermediate', q:'When are stored procedures a good choice, and what are the tradeoffs? (resume tie-in)',
       a:`<p><strong>Pros:</strong> set-based logic runs close to data (less round-tripping), a stable API/contract, parameterization (SQL-injection safe), and permissioning. Great for bulk data operations and complex multi-statement transactions. <strong>Cons:</strong> business logic split across app + DB is harder to test/version/deploy, DB-specific, and can hide performance problems. Modern approach: keep domain logic in the app, reserve procs for data-intensive/bulk operations where they clearly win.</p>`},
      {lvl:'advanced', q:'What are triggers, and why do they need care?',
       a:`<p>Triggers run automatically on INSERT/UPDATE/DELETE (or DDL). Uses: auditing, maintaining denormalized copies, enforcing cross-row rules. <strong>Care:</strong> they run inside the triggering transaction (hold locks longer), are invisible at the call site (surprising side effects), can recurse/cascade, and must be written set-based (they fire once per statement with <code>inserted</code>/<code>deleted</code> tables, not per row). Overusing triggers makes systems hard to reason about.</p>`},
      {lvl:'intermediate', q:'Key differences between SQL Server and PostgreSQL you have hit?',
       a:`<ul><li>Concurrency: PostgreSQL is MVCC by default (readers don't block writers); SQL Server needs RCSI/Snapshot enabled.</li>
          <li>Identifiers: PostgreSQL folds unquoted names to lowercase; SQL Server is case-insensitive by default collation.</li>
          <li>Types: PostgreSQL has rich native <code>jsonb</code>, arrays, and extensions (PostGIS); SQL Server has <code>JSON</code> functions but no jsonb indexing equivalent (until recently).</li>
          <li>Auto-increment: <code>IDENTITY</code>/sequences vs <code>SERIAL</code>/<code>GENERATED</code>.</li>
          <li>Concurrency token: <code>rowversion</code> vs system column <code>xmin</code>.</li>
          <li>VACUUM/autovacuum in PostgreSQL reclaims dead tuples (MVCC bloat) — an ops concern with no SQL Server analog.</li></ul>`},
      {lvl:'advanced', q:'When would you use jsonb in PostgreSQL vs normalized columns?',
       a:`<p>Use <code>jsonb</code> for semi-structured, sparse, or evolving attributes (e.g., per-tenant custom settings) where schema-per-row varies — and index with GIN for containment queries. Keep core, queried, and relational data in proper columns for constraints, joins, and predictable performance. Overusing JSON turns your relational DB into a slow document store.</p>`},
    ]},
    { name:'Redis & caching', qs:[
      {lvl:'intermediate', q:'What is Redis and what do you use it for?',
       a:`<p>Redis is an in-memory key-value data store (with rich types: strings, hashes, lists, sets, sorted sets, streams). Uses: distributed cache, session store, rate limiting, leaderboards (sorted sets), pub/sub, distributed locks, and as a SignalR/SSE backplane. Sub-millisecond reads make it ideal for offloading hot queries.</p>`},
      {lvl:'advanced', q:'Explain the cache-aside pattern and its pitfalls.',
       a:`<pre><code>var cached = await cache.GetAsync(key);
if (cached != null) return Deserialize(cached);
var data = await db.LoadAsync(...);        // miss
await cache.SetAsync(key, Serialize(data), ttl);
return data;</code></pre>
          <p><strong>Pitfalls:</strong> stale data (need TTL + invalidation on writes), <strong>cache stampede</strong> (many misses hammer the DB at once — mitigate with a lock/single-flight or slightly randomized TTLs), and <strong>thundering herd</strong> on key expiry. Always plan invalidation, not just population.</p>`},
      {lvl:'advanced', q:'How do you implement a distributed lock with Redis, and what are the risks?',
       a:`<p><code>SET key value NX PX 30000</code> acquires a lock with a unique token and expiry; release only if the token matches (Lua script) so you don't delete someone else's lock. Risks: clock/GC pauses causing two holders, and expiry firing mid-work. For strong guarantees use Redlock cautiously or prefer a DB-level lock/leasing. For many cases (dedupe, single-flight) a best-effort lock is fine.</p>`},
      {lvl:'senior', q:'What eviction and persistence options matter for a cache?',
       a:`<p>Eviction policies (e.g., <code>allkeys-lru</code>, <code>volatile-ttl</code>) control what's dropped under memory pressure — choose LRU/LFU for caches. Persistence: RDB snapshots (point-in-time, faster restart) vs AOF (append-only log, more durable). A pure cache can disable persistence for speed; a session/state store should persist. Size memory with headroom and monitor eviction/hit ratio.</p>`},
      {lvl:'scenario', q:'Cache and DB are out of sync after an update. How do you fix the pattern?',
       a:`<p>Prefer <strong>invalidate-on-write</strong> (delete the key) over update-in-place to avoid race conditions where a stale read repopulates after a write. For read-heavy correctness, use write-through or short TTLs. If ordering matters, version entries or use a change feed to push invalidations. Accept that caches are eventually consistent and design UX accordingly.</p>`},
    ]},
    { name:'Query writing & optimization', qs:[
      {lvl:'intermediate', q:'Write a query for the 2nd highest salary per department.',
       a:`<pre><code>SELECT DeptId, Salary FROM (
  SELECT DeptId, Salary,
     DENSE_RANK() OVER (PARTITION BY DeptId ORDER BY Salary DESC) rk
  FROM Employees
) t WHERE rk = 2;</code></pre>
          <p><code>DENSE_RANK</code> handles ties (two people sharing the top salary still yields the true 2nd distinct salary). Use <code>ROW_NUMBER</code> if you want exactly one row regardless of ties.</p>`},
      {lvl:'advanced', q:'Find and remove duplicate rows keeping one.',
       a:`<pre><code>WITH d AS (
  SELECT *, ROW_NUMBER() OVER
    (PARTITION BY Email ORDER BY Id) rn
  FROM Users)
DELETE FROM d WHERE rn &gt; 1;</code></pre>
          <p>Partition by the columns that define a duplicate; keep <code>rn = 1</code>. Add a unique constraint/index afterward to prevent recurrence.</p>`},
      {lvl:'production', q:'A nightly report query blocks the app. How do you resolve it?',
       a:`<p>Isolate analytics from OLTP: run reports against a read replica / snapshot, or use <code>READ COMMITTED SNAPSHOT</code> so the report doesn't take shared locks that block writers. Longer term, move reporting to a separate read model / warehouse fed asynchronously. Also tune the query (indexes, avoid table scans) and schedule during low traffic.</p>`},
    ]},
  ]
});
</script>
<script>
/* ===================== FRONTEND MASTERCLASS ===================== */
S({
  id:'frontend', cat:'Frontend Masterclass', icon:'🎨', title:'JavaScript, TypeScript, React & Vue', tag:'Frontend',
  lede:'Language internals plus the two frameworks on your resume: React.js and Vue 3 (with Kendo UI). Covers reactivity, hooks, rendering, state, and performance.',
  intro:`
    <h2>What to master</h2>
    <ul>
      <li><strong>JS core:</strong> closures, prototypes, <code>this</code>, event loop, promises/async, hoisting, ES modules.</li>
      <li><strong>TypeScript:</strong> structural typing, generics, unions/narrowing, utility types, <code>unknown</code> vs <code>any</code>.</li>
      <li><strong>React:</strong> reconciliation, hooks rules, memoization, state management, data fetching, Suspense.</li>
      <li><strong>Vue 3:</strong> reactivity (ref/reactive), composition API, computed vs watch, lifecycle, provide/inject.</li>
      <li><strong>Senior:</strong> rendering performance, bundle/code-splitting, hydration/SSR, accessibility, streaming UI.</li>
    </ul>
    <div class="callout"><span class="t">Event loop in one line</span>Synchronous code runs first; microtasks (promise callbacks) drain fully before the next macrotask (setTimeout, I/O, rendering).</div>
  `,
  groups:[
    { name:'JavaScript core', qs:[
      {lvl:'basic', q:'Explain the event loop, microtasks and macrotasks.',
       a:`<p>JS is single-threaded with an event loop. The call stack runs sync code. Async callbacks queue as <strong>macrotasks</strong> (setTimeout, DOM events, I/O) or <strong>microtasks</strong> (Promise <code>.then</code>, <code>queueMicrotask</code>, <code>await</code> continuations). After each macrotask, the loop drains <em>all</em> microtasks before the next macrotask/render.</p>
          <pre><code>console.log(1);
setTimeout(() =&gt; console.log(2));      // macrotask
Promise.resolve().then(() =&gt; console.log(3)); // microtask
console.log(4);
// output: 1, 4, 3, 2</code></pre>`},
      {lvl:'intermediate', q:'What is a closure? Give a real use.',
       a:`<p>A closure is a function bundled with references to its lexical scope, so it can access outer variables after the outer function returns. Uses: data privacy (module pattern), function factories, memoization, and event handlers that remember state.</p>
          <pre><code>function counter(){ let n = 0; return () =&gt; ++n; }
const next = counter(); next(); // 1  next(); // 2</code></pre>`},
      {lvl:'intermediate', q:'How does "this" binding work?',
       a:`<p><code>this</code> depends on <em>call site</em>: method call → the object; standalone function → undefined (strict) / global; <code>new</code> → the new instance; explicit <code>call/apply/bind</code> → the provided value. <strong>Arrow functions</strong> have no own <code>this</code> — they capture it lexically, which is why they're ideal for callbacks inside class methods/hooks.</p>`},
      {lvl:'intermediate', q:'== vs === and other coercion gotchas?',
       a:`<p><code>===</code> compares without type coercion; <code>==</code> coerces (<code>0 == ""</code>, <code>null == undefined</code>, <code>[] == false</code>). Always use <code>===</code> except the idiomatic <code>x == null</code> to catch both null and undefined. Know that <code>NaN !== NaN</code> (use <code>Number.isNaN</code>) and <code>typeof null === "object"</code>.</p>`},
      {lvl:'advanced', q:'Explain prototypal inheritance.',
       a:`<p>Objects have an internal <code>[[Prototype]]</code> link; property lookups walk the prototype chain until found or null. <code>class</code> is syntactic sugar over this. Functions have a <code>prototype</code> object used when called with <code>new</code>. Understanding the chain explains method sharing, <code>instanceof</code>, and why adding to a prototype affects all instances.</p>`},
    ]},
    { name:'TypeScript', qs:[
      {lvl:'intermediate', q:'What is structural typing and how does it differ from nominal typing?',
       a:`<p>TS uses <strong>structural</strong> typing: compatibility is based on shape, not declared name. If an object has all required members of a type, it's assignable — even without explicitly implementing it. This is flexible (duck typing) but can allow accidental matches; use branded types when you need nominal-like distinctness.</p>`},
      {lvl:'intermediate', q:'unknown vs any vs never?',
       a:`<p><code>any</code> disables type checking (avoid). <code>unknown</code> is the type-safe top type — you must narrow before use. <code>never</code> is the bottom type: no value, used for exhaustiveness checks and functions that never return. Prefer <code>unknown</code> at boundaries (parsing JSON) and narrow with guards.</p>`},
      {lvl:'advanced', q:'Show useful generics and utility types.',
       a:`<pre><code>type ApiResult&lt;T&gt; = { data: T; error?: string };
function first&lt;T&gt;(a: T[]): T | undefined { return a[0]; }

// utility types
type PartialUser = Partial&lt;User&gt;;
type IdOnly     = Pick&lt;User, 'id'&gt;;
type NoId       = Omit&lt;User, 'id'&gt;;
type Readonly2  = Readonly&lt;User&gt;;
type Keys       = keyof User;   // 'id' | 'name' | ...</code></pre>
          <p>Generics + utility types let you model transformations without duplicating interfaces.</p>`},
      {lvl:'advanced', q:'How does discriminated union narrowing work?',
       a:`<pre><code>type Shape =
  | { kind:'circle'; r:number }
  | { kind:'rect'; w:number; h:number };
function area(s: Shape){
  switch(s.kind){
    case 'circle': return Math.PI*s.r**2;
    case 'rect':   return s.w*s.h;
    default: const _x: never = s; return _x; // exhaustive
  }
}</code></pre>
          <p>The literal <code>kind</code> discriminant lets TS narrow each branch; the <code>never</code> default enforces handling all cases at compile time.</p>`},
    ]},
    { name:'React', qs:[
      {lvl:'basic', q:'What are the rules of hooks and why do they exist?',
       a:`<p>Call hooks only at the top level (not in loops/conditions/nested functions) and only from React functions. React tracks hook state <em>by call order</em>; conditional calls would misalign state between renders. This is why the linter enforces it. Custom hooks compose other hooks and must start with <code>use</code>.</p>`},
      {lvl:'intermediate', q:'useState vs useRef vs useMemo vs useCallback?',
       a:`<ul><li><code>useState</code>: reactive value; changing it re-renders.</li>
          <li><code>useRef</code>: mutable box that persists across renders and does <em>not</em> trigger re-render (DOM refs, timers, previous values).</li>
          <li><code>useMemo</code>: cache an expensive computed value between renders.</li>
          <li><code>useCallback</code>: memoize a function identity so children/deps don't see it change.</li></ul>
          <p>Don't over-memoize — it adds complexity and its own cost. Memoize when identity/expensive compute actually causes measured re-renders.</p>`},
      {lvl:'advanced', q:'What is the stale closure problem in useEffect?',
       a:`<p>An effect/callback captures the state/props from the render it was created in. If dependencies are wrong, it reads stale values.</p>
          <pre><code>useEffect(() =&gt; {
  const id = setInterval(() =&gt; setCount(count + 1), 1000);
  return () =&gt; clearInterval(id);
}, []); // BUG: count frozen at 0</code></pre>
          <p>Fix: use the functional updater <code>setCount(c =&gt; c + 1)</code>, or include <code>count</code> in deps. Understanding this is a strong senior signal.</p>`},
      {lvl:'advanced', q:'How does reconciliation and the key prop work?',
       a:`<p>React diffs the new element tree against the previous one. For lists, <code>key</code> identifies elements across renders so React can reuse/move DOM nodes instead of recreating them. Using array index as key causes bugs when items reorder/insert (state attaches to the wrong item). Use stable, unique ids.</p>`},
      {lvl:'senior', q:'How do you diagnose and fix unnecessary re-renders?',
       a:`<p>Profile with the React DevTools Profiler to see what rendered and why. Fixes: lift state down (colocate), split components, memoize with <code>React.memo</code> + stable props (<code>useCallback</code>/<code>useMemo</code>), avoid creating new object/array literals in render, and use selectors (Zustand/Redux) so components subscribe only to needed slices. Measure before and after.</p>`},
      {lvl:'intermediate', q:'Why use React Query / TanStack Query over useEffect fetching?',
       a:`<p>It handles caching, deduplication, background refetching, stale-while-revalidate, retries, pagination, and request cancellation declaratively — removing boilerplate and race conditions common with manual <code>useEffect</code> fetches. It separates <em>server state</em> (async, cached, shared) from <em>client state</em> (local UI), which is a cleaner mental model.</p>`},
    ]},
    { name:'Vue 3', qs:[
      {lvl:'intermediate', q:'How does Vue 3 reactivity work (ref vs reactive)?',
       a:`<p>Vue 3 uses ES <code>Proxy</code> to track reads and trigger updates on writes. <code>reactive()</code> makes an object deeply reactive; <code>ref()</code> wraps a value in <code>{ value }</code> (needed for primitives and to keep reactivity when passed around). In templates, refs auto-unwrap. Losing reactivity by destructuring a <code>reactive</code> object is a common bug — use <code>toRefs()</code>.</p>`},
      {lvl:'intermediate', q:'computed vs watch vs watchEffect?',
       a:`<ul><li><code>computed</code>: derived, cached value that recomputes only when dependencies change — use for derived state.</li>
          <li><code>watch</code>: run side effects when specific sources change (with old/new values, lazy by default).</li>
          <li><code>watchEffect</code>: run immediately and re-run when any accessed reactive dep changes.</li></ul>
          <p>Prefer <code>computed</code> for values you render; <code>watch</code> for side effects like API calls.</p>`},
      {lvl:'advanced', q:'Composition API vs Options API — why did Vue 3 add it?',
       a:`<p>The Options API organizes code by option type (data/methods/computed), scattering one feature's logic across sections. The <strong>Composition API</strong> (<code>setup</code>/<code>&lt;script setup&gt;</code>) groups logic by <em>concern</em> and enables reusable <strong>composables</strong> (like React hooks) with better TypeScript inference. Options API is still fine for simple components.</p>`},
      {lvl:'intermediate', q:'How do you build and integrate complex Kendo UI components? (resume tie-in)',
       a:`<p>Kendo UI provides rich data grids, schedulers, dropdowns, etc. Keys to success: bind to the component's data/value contracts, handle server-side operations (paging/sorting/filtering pushed to the API for large datasets rather than client-side), manage state via v-model/refs, debounce heavy events, and theme via the design system. For 10+ advanced components, wrap them in your own composables/components to standardize behavior and reduce duplication.</p>`},
    ]},
    { name:'Performance & scenario', qs:[
      {lvl:'senior', q:'How do you improve initial load performance of an SPA?',
       a:`<p>Code-split by route (lazy imports), tree-shake, compress (gzip/brotli), cache static assets with hashing + long max-age, defer non-critical JS, prefetch likely routes, and reduce bundle via lighter deps. Measure with Lighthouse/Web Vitals (LCP, CLS, INP). Consider SSR/streaming for content-heavy pages to improve perceived load.</p>`},
      {lvl:'scenario', q:'A data grid with 50k rows freezes the browser. What do you do?',
       a:`<p>Don't render 50k DOM nodes. Use <strong>virtualization</strong> (windowing) so only visible rows are in the DOM, push paging/sorting/filtering to the server, debounce input, and memoize row rendering. For truly large exports, stream/download server-side. Kendo Grid supports virtual scrolling + server operations — enable them.</p>`},
      {lvl:'production', q:'Users report a memory leak on a long-lived dashboard. How do you find it?',
       a:`<p>Take heap snapshots in Chrome DevTools over time and diff for growing detached DOM nodes/listeners. Common causes: intervals/subscriptions not cleaned up (missing <code>useEffect</code> cleanup / Vue <code>onUnmounted</code>), event listeners not removed, closures holding large data, and caches without eviction. Fix cleanup and bound caches.</p>`},
    ]},
  ]
});
