<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senior Engineer Interview Prep Portal — KR</title>
<style>
:root{
  --bg:#0d1117; --bg-2:#131a24; --bg-3:#1b2430; --card:#161d27; --card-2:#1c2530;
  --border:#26303c; --text:#e6edf3; --text-dim:#9aa7b4; --text-faint:#6b7684;
  --accent:#4f9cf9; --accent-2:#7c5cff; --accent-3:#2dd4bf; --ok:#3fb950; --warn:#d29922; --err:#f85149;
  --code-bg:#0b1017; --shadow:0 6px 24px rgba(0,0,0,.35);
  --lvl-basic:#3fb950; --lvl-inter:#4f9cf9; --lvl-adv:#d29922; --lvl-senior:#f85149; --lvl-scenario:#7c5cff;
}
html[data-theme="light"]{
  --bg:#f4f6fa; --bg-2:#eaeef4; --bg-3:#e2e8f0; --card:#ffffff; --card-2:#f7f9fc;
  --border:#d7dee7; --text:#1b2430; --text-dim:#55606d; --text-faint:#8a94a1;
  --accent:#2563eb; --accent-2:#7c3aed; --accent-3:#0d9488; --ok:#16a34a; --warn:#b45309; --err:#dc2626;
  --code-bg:#0e1420; --shadow:0 6px 24px rgba(20,40,80,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;line-height:1.6;font-size:15px;transition:background .25s,color .25s}
::selection{background:var(--accent);color:#fff}
/* Scrollbars */
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:var(--bg-2)}
::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:6px;border:2px solid var(--bg-2)}
::-webkit-scrollbar-thumb:hover{background:var(--border)}

/* ---------- Top bar ---------- */
header.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;
  padding:10px 18px;background:rgba(13,17,23,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
html[data-theme="light"] header.topbar{background:rgba(244,246,250,.85)}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;white-space:nowrap}
.brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-weight:800}
.brand small{display:block;font-weight:500;color:var(--text-dim);font-size:11px}
.searchwrap{flex:1;max-width:560px;position:relative}
#search{width:100%;padding:9px 14px 9px 38px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;outline:none}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,156,249,.2)}
.searchwrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.55}
.topbtns{display:flex;gap:8px;align-items:center}
.btn{cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);padding:8px 12px;border-radius:9px;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.icon{padding:8px 10px}
#menuToggle{display:none}

/* ---------- Layout ---------- */
.layout{display:flex;min-height:calc(100vh - 55px)}
nav.sidebar{width:290px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg-2);
  position:sticky;top:55px;height:calc(100vh - 55px);overflow-y:auto;padding:14px 10px 40px}
.navcat{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);margin:16px 10px 6px;font-weight:700}
.navlink{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;color:var(--text-dim);cursor:pointer;font-size:13.5px;font-weight:500;transition:.12s;position:relative}
.navlink:hover{background:var(--bg-3);color:var(--text)}
.navlink.active{background:linear-gradient(90deg,rgba(79,156,249,.16),transparent);color:var(--accent);font-weight:700}
.navlink.active::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:3px;background:var(--accent)}
.navlink .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.navlink .cnt{font-size:10.5px;color:var(--text-faint);background:var(--bg-3);border-radius:20px;padding:1px 7px}
.navdot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.navdot.done{background:var(--ok)}
.navdot.part{background:var(--warn)}

main{flex:1;min-width:0;padding:26px clamp(16px,4vw,54px) 90px;max-width:1180px;margin:0 auto;width:100%}

/* ---------- Sections ---------- */
.section{display:none;animation:fade .3s}
.section.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.sec-head{margin-bottom:18px}
.sec-head h1{font-size:27px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sec-head .tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--bg-3);color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}
.sec-head p.lede{color:var(--text-dim);margin-top:8px;font-size:15px;max-width:850px}
.sec-controls{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap;align-items:center}
.progress-mini{flex:1;min-width:180px}
.progress-mini .bar{height:8px;border-radius:5px;background:var(--bg-3);overflow:hidden}
.progress-mini .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-3));width:0;transition:width .4s}
.progress-mini .lbl{font-size:12px;color:var(--text-dim);margin-top:5px}

/* ---------- Intro / educational content ---------- */
.intro{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 24px;margin-bottom:22px;box-shadow:var(--shadow)}
.intro h2{font-size:19px;margin:18px 0 9px;color:var(--accent);font-weight:700}
.intro h2:first-child{margin-top:0}
.intro h3{font-size:15.5px;margin:15px 0 6px;font-weight:700;color:var(--text)}
.intro p{margin:9px 0;color:var(--text-dim)}
.intro ul,.intro ol{margin:9px 0 9px 22px;color:var(--text-dim)}
.intro li{margin:4px 0}
.intro strong,.intro b{color:var(--text)}
.intro code{background:var(--bg-3);padding:2px 6px;border-radius:5px;font-family:'SF Mono',Consolas,Menlo,monospace;font-size:12.5px;color:var(--accent-3)}
.intro pre{background:var(--code-bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;overflow-x:auto;margin:12px 0}
.intro pre code{background:none;padding:0;color:#c9d5e3;font-size:12.6px;line-height:1.55}
.intro table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13.5px}
.intro th,.intro td{border:1px solid var(--border);padding:8px 11px;text-align:left}
.intro th{background:var(--bg-3);color:var(--text);font-weight:700}
.intro td{color:var(--text-dim)}
.callout{border-left:4px solid var(--accent);background:var(--bg-2);padding:11px 15px;border-radius:0 10px 10px 0;margin:13px 0}
.callout.warn{border-color:var(--warn)}
.callout.tip{border-color:var(--ok)}
.callout .t{font-weight:700;color:var(--text);display:block;margin-bottom:3px;font-size:13px}

/* ---------- Q&A cards ---------- */
.qgroup{margin:26px 0}
.qgroup > h2.gt{font-size:18px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.qgroup > h2.gt .gcount{font-size:12px;font-weight:600;color:var(--text-faint)}
.qgroup > .gdesc{color:var(--text-dim);font-size:13.5px;margin-bottom:12px}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:12px;margin:10px 0;overflow:hidden;transition:border-color .15s}
.qcard:hover{border-color:var(--border)}
.qcard.open{border-color:var(--accent)}
.qhead{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.qhead .chk{flex-shrink:0;margin-top:1px}
.qhead .chk input{display:none}
.qhead .chk label{display:block;width:20px;height:20px;border-radius:6px;border:2px solid var(--border);cursor:pointer;position:relative;transition:.15s}
.qhead .chk input:checked + label{background:var(--ok);border-color:var(--ok)}
.qhead .chk input:checked + label::after{content:"";position:absolute;left:6px;top:2px;width:5px;height:10px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}
.qhead .qtext{flex:1;font-weight:600;font-size:14.5px}
.qcard.done .qtext{color:var(--text-faint);text-decoration:line-through}
.qhead .lvl{flex-shrink:0;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:20px;color:#fff}
.lvl-basic{background:var(--lvl-basic)}.lvl-intermediate{background:var(--lvl-inter)}.lvl-advanced{background:var(--lvl-adv)}
.lvl-senior{background:var(--lvl-senior)}.lvl-scenario{background:var(--lvl-scenario)}.lvl-production{background:#0891b2}
.qhead .caret{flex-shrink:0;transition:transform .2s;opacity:.6;margin-top:2px}
.qcard.open .caret{transform:rotate(180deg)}
.qbody{display:none;padding:0 16px 16px 48px;color:var(--text-dim);font-size:14px;border-top:1px solid transparent}
.qcard.open .qbody{display:block;animation:fade .2s}
.qbody p{margin:9px 0}
.qbody ul,.qbody ol{margin:8px 0 8px 20px}
.qbody li{margin:3px 0}
.qbody strong{color:var(--text)}
.qbody code{background:var(--bg-3);padding:2px 6px;border-radius:5px;font-family:'SF Mono',Consolas,monospace;font-size:12.5px;color:var(--accent-3)}
.qbody pre{background:var(--code-bg);border:1px solid var(--border);border-radius:9px;padding:13px 15px;overflow-x:auto;margin:11px 0}
.qbody pre code{background:none;padding:0;color:#c9d5e3;font-size:12.4px;line-height:1.55}
.qbody table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.qbody th,.qbody td{border:1px solid var(--border);padding:7px 10px;text-align:left}
.qbody th{background:var(--bg-3);color:var(--text)}

/* ---------- Dashboard ---------- */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:16px;margin:8px 0 26px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
.stat .big{font-size:32px;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat .lbl{color:var(--text-dim);font-size:13px;margin-top:7px;font-weight:600}
.ring-wrap{display:flex;align-items:center;gap:20px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px 24px;box-shadow:var(--shadow);margin-bottom:24px;flex-wrap:wrap}
.ring{--p:0;width:120px;height:120px;border-radius:50%;flex-shrink:0;
  background:conic-gradient(var(--accent) calc(var(--p)*1%),var(--bg-3) 0);display:grid;place-items:center}
.ring::before{content:"";position:absolute;width:92px;height:92px;border-radius:50%;background:var(--card)}
.ring b{position:relative;font-size:24px;font-weight:800}
.ring-info h3{font-size:18px;margin-bottom:4px}
.ring-info p{color:var(--text-dim);font-size:14px}
.sched{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:8px}
.sched .day{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px 17px}
.sched .day h4{color:var(--accent);font-size:14px;margin-bottom:7px}
.sched .day ul{margin-left:17px;color:var(--text-dim);font-size:13px}
.reset-note{color:var(--text-faint);font-size:12px;margin-top:10px}

/* ---------- Roadmap ---------- */
.rmap{position:relative;margin:10px 0}
.rmap .step{position:relative;padding:0 0 26px 34px;border-left:2px solid var(--border)}
.rmap .step:last-child{border-left-color:transparent}
.rmap .step::before{content:attr(data-n);position:absolute;left:-15px;top:0;width:28px;height:28px;border-radius:50%;
  background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px}
.rmap .step h3{font-size:16px;margin-bottom:5px}
.rmap .step .meta{font-size:12px;color:var(--text-faint);margin-bottom:7px}
.rmap .step p{color:var(--text-dim);font-size:13.5px;margin:5px 0}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.chip{font-size:11.5px;padding:3px 10px;border-radius:20px;background:var(--bg-3);color:var(--text-dim);border:1px solid var(--border)}

.empty{text-align:center;color:var(--text-faint);padding:60px 20px;font-size:15px}
footer.foot{text-align:center;color:var(--text-faint);font-size:12.5px;padding:30px 20px;border-top:1px solid var(--border)}
.backtop{position:fixed;right:22px;bottom:22px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;box-shadow:var(--shadow);font-size:20px;display:none;z-index:60}
.backtop.show{display:block}

@media(max-width:900px){
  #menuToggle{display:block}
  nav.sidebar{position:fixed;left:0;top:55px;z-index:90;transform:translateX(-100%);transition:transform .25s;box-shadow:var(--shadow)}
  nav.sidebar.open{transform:none}
  .brand small{display:none}
}
@media(max-width:600px){
  .brand .txt{display:none}
  main{padding:18px 14px 80px}
  .sec-head h1{font-size:22px}
}
.scrim{display:none;position:fixed;inset:55px 0 0;background:rgba(0,0,0,.5);z-index:80}
.scrim.show{display:block}
@media(min-width:901px){.scrim{display:none!important}}
</style>
</head>
<body>
<header class="topbar">
  <button class="btn icon" id="menuToggle" aria-label="Menu">☰</button>
  <div class="brand">
    <div class="logo">KR</div>
    <div class="txt">Interview Prep Portal<small>Senior SWE • Full Stack • .NET • AI Engineering</small></div>
  </div>
  <div class="searchwrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search" type="text" placeholder="Search topics & questions...  (press /)" autocomplete="off">
  </div>
  <div class="topbtns">
    <button class="btn" id="expandAll">Expand all</button>
    <button class="btn" id="collapseAll">Collapse all</button>
    <button class="btn icon" id="themeToggle" title="Toggle theme">🌙</button>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="scrim" id="scrim"></div>
  <main id="main"></main>
</div>
<button class="backtop" id="backtop" title="Back to top">↑</button>

<script>
/* ============================================================
   DATA-DRIVEN ENGINE
   Sections are pushed into window.SECTIONS by later scripts.
   The renderer runs on DOMContentLoaded (after all pushes).
   ============================================================ */
window.SECTIONS = window.SECTIONS || [];
window.S = function(sec){ window.SECTIONS.push(sec); };

/* localStorage helpers for progress persistence */
const LS_KEY = 'kr_interview_progress_v1';
const LS_THEME = 'kr_interview_theme';
function loadProgress(){ try{return JSON.parse(localStorage.getItem(LS_KEY))||{}}catch(e){return {}} }
function saveProgress(p){ try{localStorage.setItem(LS_KEY, JSON.stringify(p))}catch(e){} }
let PROGRESS = loadProgress();

/* stable id for each question */
function qid(secId, gi, qi){ return secId + '::' + gi + '::' + qi; }

const LEVELS = ['basic','intermediate','advanced','senior','scenario','production'];
function lvlClass(l){ return 'lvl-' + (LEVELS.includes((l||'').toLowerCase()) ? l.toLowerCase() : 'intermediate'); }

/* ---------- Render sidebar ---------- */
function buildSidebar(){
  const nav = document.getElementById('sidebar');
  const cats = [];
  const map = {};
  SECTIONS.forEach(s=>{
    const c = s.cat || 'General';
    if(!map[c]){ map[c]=[]; cats.push(c); }
    map[c].push(s);
  });
  let html='';
  cats.forEach(c=>{
    html += `<div class="navcat">${c}</div>`;
    map[c].forEach(s=>{
      const total = countQ(s);
      html += `<div class="navlink" data-sec="${s.id}">
        <span class="navdot" id="dot-${s.id}"></span>
        <span class="nm">${s.icon?s.icon+' ':''}${s.title}</span>
        ${total?`<span class="cnt">${total}</span>`:''}
      </div>`;
    });
  });
  nav.innerHTML = html;
  nav.querySelectorAll('.navlink').forEach(el=>{
    el.addEventListener('click',()=>{ showSection(el.dataset.sec); closeMobileNav(); });
  });
}
function countQ(s){ let n=0; (s.groups||[]).forEach(g=> n += (g.qs||[]).length); return n; }

/* ---------- Render a section on demand ---------- */
const rendered = {};
function renderSection(s){
  if(rendered[s.id]) return rendered[s.id];
  const el = document.createElement('section');
  el.className='section'; el.id='sec-'+s.id;
  let html = `<div class="sec-head">
      <h1>${s.icon?s.icon+' ':''}${s.title} ${s.tag?`<span class="tag">${s.tag}</span>`:''}</h1>
      ${s.lede?`<p class="lede">${s.lede}</p>`:''}
    </div>`;
  const total = countQ(s);
  if(total){
    html += `<div class="sec-controls">
        <div class="progress-mini">
          <div class="bar"><i id="bar-${s.id}"></i></div>
          <div class="lbl" id="lbl-${s.id}"></div>
        </div>
        <button class="btn" data-act="secExpand">Expand all</button>
        <button class="btn" data-act="secCollapse">Collapse all</button>
        <button class="btn" data-act="secClear">Reset progress</button>
      </div>`;
  }
  if(s.intro){ html += `<div class="intro">${s.intro}</div>`; }
  if(s.customHTML){ html += s.customHTML; }
  (s.groups||[]).forEach((g,gi)=>{
    html += `<div class="qgroup"><h2 class="gt">${g.name} <span class="gcount">${(g.qs||[]).length} questions</span></h2>`;
    if(g.desc) html += `<div class="gdesc">${g.desc}</div>`;
    (g.qs||[]).forEach((q,qi)=>{
      const id = qid(s.id, gi, qi);
      const done = !!PROGRESS[id];
      html += `<div class="qcard ${done?'done':''}" data-qid="${id}">
        <div class="qhead">
          <span class="chk"><input type="checkbox" id="cb-${id}" ${done?'checked':''}><label for="cb-${id}"></label></span>
          <span class="qtext">${q.q}</span>
          ${q.lvl?`<span class="lvl ${lvlClass(q.lvl)}">${q.lvl}</span>`:''}
          <span class="caret">▾</span>
        </div>
        <div class="qbody">${q.a}</div>
      </div>`;
    });
    html += `</div>`;
  });
  el.innerHTML = html;
  document.getElementById('main').appendChild(el);
  wireSection(el, s);
  rendered[s.id]=el;
  return el;
}

function wireSection(el, s){
  // toggle answers
  el.querySelectorAll('.qcard').forEach(card=>{
    const head = card.querySelector('.qhead');
    head.addEventListener('click',(e)=>{
      if(e.target.closest('.chk')) return;
      card.classList.toggle('open');
    });
    const cb = card.querySelector('input[type=checkbox]');
    cb.addEventListener('change',()=>{
      const id = card.dataset.qid;
      if(cb.checked){ PROGRESS[id]=1; card.classList.add('done'); }
      else { delete PROGRESS[id]; card.classList.remove('done'); }
      saveProgress(PROGRESS);
      updateSectionProgress(s);
      updateDashboard();
      updateDot(s);
    });
  });
  // section controls
  el.querySelectorAll('[data-act]').forEach(b=>{
    b.addEventListener('click',()=>{
      const a=b.dataset.act;
      if(a==='secExpand') el.querySelectorAll('.qcard').forEach(c=>c.classList.add('open'));
      if(a==='secCollapse') el.querySelectorAll('.qcard').forEach(c=>c.classList.remove('open'));
      if(a==='secClear'){
        if(confirm('Reset progress for this section?')){
          el.querySelectorAll('.qcard').forEach(c=>{
            const id=c.dataset.qid; delete PROGRESS[id];
            c.classList.remove('done'); const cb=c.querySelector('input'); if(cb) cb.checked=false;
          });
          saveProgress(PROGRESS); updateSectionProgress(s); updateDashboard(); updateDot(s);
        }
      }
    });
  });
  updateSectionProgress(s);
}

function sectionStats(s){
  let total=0, done=0;
  (s.groups||[]).forEach((g,gi)=> (g.qs||[]).forEach((q,qi)=>{ total++; if(PROGRESS[qid(s.id,gi,qi)]) done++; }));
  return {total,done};
}
function updateSectionProgress(s){
  const {total,done}=sectionStats(s);
  const bar=document.getElementById('bar-'+s.id), lbl=document.getElementById('lbl-'+s.id);
  if(bar) bar.style.width = total? (done/total*100)+'%':'0%';
  if(lbl) lbl.textContent = `${done} / ${total} completed (${total?Math.round(done/total*100):0}%)`;
}
function updateDot(s){
  const dot=document.getElementById('dot-'+s.id); if(!dot) return;
  const {total,done}=sectionStats(s);
  dot.className='navdot'+(total&&done===total?' done':(done>0?' part':''));
}

/* ---------- Navigation ---------- */
let currentSec=null;
function showSection(id){
  const s = SECTIONS.find(x=>x.id===id); if(!s) return;
  document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
  const el = renderSection(s);
  el.classList.add('active');
  currentSec=id;
  document.querySelectorAll('.navlink').forEach(n=>n.classList.toggle('active', n.dataset.sec===id));
  window.scrollTo({top:0,behavior:'smooth'});
  location.hash = id;
  if(id==='dashboard') updateDashboard();
}
function closeMobileNav(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('scrim').classList.remove('show'); }

/* ---------- Dashboard live values ---------- */
function updateDashboard(){
  let total=0, done=0, secDone=0, secTotal=0;
  SECTIONS.forEach(s=>{
    const st=sectionStats(s);
    if(st.total){ secTotal++; total+=st.total; done+=st.done; if(st.done===st.total) secDone++; }
    updateDot(s);
  });
  const pct = total?Math.round(done/total*100):0;
  const set=(id,v)=>{const e=document.getElementById(id); if(e) e.textContent=v;};
  set('d-total', total); set('d-done', done); set('d-pct', pct+'%'); set('d-sec', secTotal);
  set('d-secdone', secDone);
  const ring=document.getElementById('d-ring');
  if(ring){ ring.style.setProperty('--p', pct); ring.querySelector('b').textContent=pct+'%'; }
  const rl=document.getElementById('d-ringlbl');
  if(rl) rl.textContent = `${done} of ${total} questions checked off across ${secTotal} topics.`;
}

/* ---------- Search ---------- */
function runSearch(term){
  term=term.trim().toLowerCase();
  const main=document.getElementById('main');
  let resultsSec = document.getElementById('sec-__search');
  if(!term){
    if(resultsSec) resultsSec.classList.remove('active');
    if(currentSec) showSection(currentSec); else showSection(SECTIONS[0].id);
    return;
  }
  // ensure all sections rendered so we can search their DOM text
  SECTIONS.forEach(s=>{ if(countQ(s)) renderSection(s); });
  const matches=[];
  SECTIONS.forEach(s=>{
    (s.groups||[]).forEach((g,gi)=>{
      (g.qs||[]).forEach((q,qi)=>{
        const hay=(q.q+' '+q.a+' '+s.title+' '+g.name).toLowerCase();
        if(hay.includes(term)) matches.push({s,g,q,id:qid(s.id,gi,qi)});
      });
    });
  });
  if(!resultsSec){
    resultsSec=document.createElement('section');
    resultsSec.className='section'; resultsSec.id='sec-__search';
    main.appendChild(resultsSec);
  }
  document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.navlink').forEach(n=>n.classList.remove('active'));
  resultsSec.classList.add('active');
  let html=`<div class="sec-head"><h1>🔎 Search results <span class="tag">${matches.length} matches</span></h1>
    <p class="lede">Showing questions & answers matching “<strong>${term.replace(/</g,'&lt;')}</strong>”.</p></div>`;
  if(!matches.length){ html+=`<div class="empty">No matches. Try another keyword.</div>`; }
  const hl = txt => txt.replace(new RegExp('('+term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark style="background:var(--warn);color:#000;border-radius:3px;padding:0 2px">$1</mark>');
  matches.slice(0,300).forEach(m=>{
    const done=!!PROGRESS[m.id];
    html+=`<div class="qcard ${done?'done':''}" data-qid="${m.id}">
      <div class="qhead">
        <span class="chk"><input type="checkbox" id="scb-${m.id}" ${done?'checked':''}><label for="scb-${m.id}"></label></span>
        <span class="qtext">${hl(m.q)} <span style="color:var(--text-faint);font-weight:500;font-size:12px">— ${m.s.title}</span></span>
        ${m.q.lvl?`<span class="lvl ${lvlClass(m.q.lvl)}">${m.q.lvl}</span>`:''}
        <span class="caret">▾</span>
      </div>
      <div class="qbody">${m.q.a}</div>
    </div>`;
  });
  resultsSec.innerHTML=html;
  resultsSec.querySelectorAll('.qcard').forEach(card=>{
    card.querySelector('.qhead').addEventListener('click',e=>{ if(e.target.closest('.chk'))return; card.classList.toggle('open'); });
    const cb=card.querySelector('input');
    cb.addEventListener('change',()=>{
      const id=card.dataset.qid;
      if(cb.checked){PROGRESS[id]=1;card.classList.add('done');}else{delete PROGRESS[id];card.classList.remove('done');}
      saveProgress(PROGRESS); updateDashboard();
    });
  });
  window.scrollTo({top:0});
}

/* ---------- Init ---------- */
function init(){
  // theme
  const savedTheme=localStorage.getItem(LS_THEME);
  if(savedTheme) document.documentElement.setAttribute('data-theme',savedTheme);
  document.getElementById('themeToggle').textContent = document.documentElement.getAttribute('data-theme')==='light'?'☀️':'🌙';

  buildSidebar();
  SECTIONS.forEach(updateDot);
  const start = (location.hash||'').replace('#','');
  showSection(SECTIONS.find(s=>s.id===start)? start : SECTIONS[0].id);
  updateDashboard();

  document.getElementById('themeToggle').addEventListener('click',()=>{
    const cur=document.documentElement.getAttribute('data-theme');
    const nx=cur==='light'?'dark':'light';
    document.documentElement.setAttribute('data-theme',nx);
    localStorage.setItem(LS_THEME,nx);
    document.getElementById('themeToggle').textContent = nx==='light'?'☀️':'🌙';
  });
  document.getElementById('expandAll').addEventListener('click',()=>document.querySelectorAll('.section.active .qcard').forEach(c=>c.classList.add('open')));
  document.getElementById('collapseAll').addEventListener('click',()=>document.querySelectorAll('.section.active .qcard').forEach(c=>c.classList.remove('open')));

  const search=document.getElementById('search');
  let t; search.addEventListener('input',()=>{ clearTimeout(t); t=setTimeout(()=>runSearch(search.value),180); });
  document.addEventListener('keydown',e=>{
    if(e.key==='/' && document.activeElement!==search){ e.preventDefault(); search.focus(); }
    if(e.key==='Escape'){ search.value=''; runSearch(''); search.blur(); }
  });

  document.getElementById('menuToggle').addEventListener('click',()=>{
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('scrim').classList.toggle('show');
  });
  document.getElementById('scrim').addEventListener('click',closeMobileNav);

  const backtop=document.getElementById('backtop');
  window.addEventListener('scroll',()=>{ backtop.classList.toggle('show', window.scrollY>500); });
  backtop.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
}
document.addEventListener('DOMContentLoaded', init);
</script>
